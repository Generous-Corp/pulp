name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macOS (ARM64)
          # - os: windows-latest
          #   name: Windows (x64)
          # - os: ubuntu-latest
          #   name: Linux (x64)

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Clone VST3 SDK
        run: |
          git clone --depth 1 --branch v3.7.12 \
            https://github.com/steinbergmedia/vst3sdk.git \
            external/vst3sdk
          cd external/vst3sdk && git submodule update --init --recursive --depth 1

      - name: Clone AudioUnitSDK (macOS)
        if: runner.os == 'macOS'
        run: |
          git clone --depth 1 \
            https://github.com/apple/AudioUnitSDK.git \
            external/AudioUnitSDK

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -j$(sysctl -n hw.ncpu 2>/dev/null || nproc 2>/dev/null || echo 4)

      - name: Upload plugin bundles
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: plugins-${{ matrix.os }}
          path: |
            build/VST3/*.vst3
            build/CLAP/*.clap
            build/AU/*.component
          retention-days: 7
