name: Build and Test

on:
  pull_request:
    branches: [main, 'develop/**']
  # Publish the Linux/Windows ccache + FetchContent caches that PR runs restore
  # from. Only a non-PR run on the default branch may write to GitHub's cloud
  # cache — a PR-run cache entry is scoped to the PR's own ref and is invisible
  # to every other PR — so without this trigger the `Save …` steps below are
  # unreachable and the restore steps are a permanent miss. A push run drops the
  # macOS leg (see resolve-provider) and skips the reporting aliases: it exists
  # to warm caches, not to gate anything.
  push:
    branches: [main]
  # Run the required macos/linux/windows alias gates on queued merge groups so
  # a GitHub merge queue on `main` can land PRs. The `merge_group` event does
  # not support `paths` filters, so it fires on every group; the classify job
  # still diffs the merged tree against origin/main and skip-safe groups
  # short-circuit as before.
  merge_group:
  workflow_dispatch:
    inputs:
      runner_provider:
        # Default is github-hosted: Namespace is drained and no
        # PULP_NAMESPACE_BUILD_*_RUNS_ON_JSON repo variables are set, so
        # resolve-provider fails fast on the `namespace` route. The
        # option is retained only for a future re-enable.
        description: "Runner provider for Linux/Windows build legs (Namespace is drained — keep github-hosted)"
        required: false
        default: github-hosted
        type: choice
        options:
          - github-hosted
          - namespace
      linux_runner_selector_json:
        description: "Optional JSON string/array for Linux runs-on when routing through Namespace"
        required: false
        default: ""
        type: string
      windows_runner_selector_json:
        description: "Optional JSON string/array for Windows runs-on when routing through Namespace"
        required: false
        default: ""
        type: string
      macos_runner_selector_json:
        description: "Optional JSON string/array for macOS runs-on when routing through Namespace; omit to keep macOS local-only"
        required: false
        default: ""
        type: string

# Cancel superseded runs when a new commit lands on the same PR.
# Stops stale build matrix runs (20-30 min each) from eating runner
# capacity when a PR accumulates fixup commits. workflow_dispatch
# runs share the same group so a manual retrigger cancels any
# auto-triggered run in flight.
#
# Push runs on main are exempt: they all share the `refs/heads/main` group, so
# cancel-in-progress would let a rapid second merge kill the first run's
# cache-save step and leave the cache stale exactly when main is busiest.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  resolve-provider:
    # Runner for the required-gate routing preamble. Defaults to ubuntu-latest
    # (no behaviour change). Set the PULP_PREAMBLE_RUNS_ON_JSON repo var to a
    # self-hosted Linux selector — e.g. ["self-hosted","Linux","ARM64",
    # "pulp-build-linux"] — to decouple the required macOS gate from
    # GitHub-hosted queue saturation: when the shared ubuntu pool is jammed this
    # preamble can't get a slot and the idle self-hosted Studios sit unused
    # behind it. Only flip once the self-hosted pool is confirmed always-on (not
    # on-demand), or the required gate just starves on a different pool. See
    # planning/2026-07-06-ci-queue-saturation-watchdog.md.
    runs-on: ${{ fromJSON(vars.PULP_PREAMBLE_RUNS_ON_JSON || '"ubuntu-latest"') }}
    outputs:
      provider: ${{ steps.resolve.outputs.provider }}
      matrix_json: ${{ steps.resolve.outputs.matrix_json }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Shared resolver lives in the repo at tools/scripts/resolve_runs_on.py.
          # We only need the script; no LFS or submodules required.
          lfs: false
      - id: resolve
        env:
          REQUESTED_PROVIDER: ${{ inputs.runner_provider || vars.PULP_DEFAULT_RUNNER_PROVIDER || 'github-hosted' }}
          # Linux runner selection (highest precedence in the resolver):
          #   1. workflow_dispatch input (per-run override), else
          #   2. PULP_LOCAL_LINUX_RUNS_ON_JSON repo var — OPT-IN routing
          #      to the self-hosted Linux ARM64 pool (e.g. ["self-hosted","Linux",
          #      "ARM64","pulp-build-linux"]); served by tools/ci/tart-runner-linux.sh,
          #      toggled per-platform in the Shipyard GUI.
          #   3. unset → '' → resolver falls through to github-hosted (default).
          # Windows is deliberately different: the required PR leg is the
          # authoritative x64 functional gate and stays on the stable VS 2022
          # image. The separate MSVC release-path gate tracks windows-latest,
          # so new-toolchain compile regressions still block before release.
          # Local QEMU Windows is ARM64; it can smoke Windows-on-ARM behavior, but
          # it is not an Intel Windows replacement. Use a workflow_dispatch input
          # only for explicit one-off experiments.
          EXPLICIT_LINUX_RUNNER_SELECTOR_JSON: ${{ inputs.linux_runner_selector_json || vars.PULP_LOCAL_LINUX_RUNS_ON_JSON || '' }}
          EXPLICIT_WINDOWS_RUNNER_SELECTOR_JSON: ${{ inputs.windows_runner_selector_json || '' }}
          # macOS routing has three layers, evaluated in order (highest
          # precedence first). The Python block below composes
          # `EXPLICIT_MACOS_RUNNER_SELECTOR_JSON` from these inputs so the
          # downstream resolver still sees a single explicit env.
          #
          # 1. Operator override (workflow_dispatch input). Always wins.
          # 2. Overflow to free GitHub-hosted macOS (macos-15). Activates
          #    when the local self-hosted Mac is saturated — at least
          #    LOCAL_MAC_OVERFLOW_THRESHOLD Build-and-Test runs already
          #    targeting it. macos-15 is free for public repos, so the
          #    spillover costs nothing; it just runs slower than the
          #    local M1 Max. Configured via OVERFLOW_MACOS_RUNS_ON_JSON.
          # 3. Local default (PULP_LOCAL_MACOS_RUNS_ON_JSON). The
          #    operator's "macOS local runner: primary required gate"
          #    policy when local is idle.
          WORKFLOW_DISPATCH_MACOS_SELECTOR: ${{ inputs.macos_runner_selector_json || '' }}
          LOCAL_MACOS_RUNS_ON_JSON: ${{ vars.PULP_LOCAL_MACOS_RUNS_ON_JSON || '' }}
          # BUSY threshold for macOS overflow. With one local runner,
          # BUSY >= 1 would overflow as soon as any job is in flight.
          # Default 2 means "local is fully saturated AND new work is
          # coming"; if local runner capacity changes, keep this in
          # lockstep with that capacity.
          LOCAL_MAC_OVERFLOW_THRESHOLD: ${{ vars.PULP_LOCAL_MAC_OVERFLOW_THRESHOLD || '2' }}
          # The runner label the overflow logic queries for `busy`. Must
          # match the label PULP_LOCAL_MACOS_RUNS_ON_JSON targets.
          LOCAL_MAC_RUNNER_LABEL: ${{ vars.PULP_LOCAL_MAC_RUNNER_LABEL || 'sanitizer' }}
          NAMESPACE_LINUX_RUNS_ON_JSON: ${{ vars.PULP_NAMESPACE_BUILD_LINUX_RUNS_ON_JSON }}
          NAMESPACE_WINDOWS_RUNS_ON_JSON: ${{ vars.PULP_NAMESPACE_BUILD_WINDOWS_RUNS_ON_JSON }}
          # macOS overflow target. Defaults to GitHub-hosted macos-15,
          # which is free for public repos. Override via the repo variable
          # PULP_OVERFLOW_BUILD_MACOS_RUNS_ON_JSON: set it to a runs-on
          # selector to change the target, or to the sentinel "local-only"
          # to disable overflow (macOS pinned to the local runner).
          # NOTE: an *empty* variable value cannot disable overflow —
          # GitHub treats unset and empty identically and the `||` default
          # below re-fills it — so "local-only" is the explicit off
          # switch, not emptiness.
          OVERFLOW_MACOS_RUNS_ON_JSON: ${{ vars.PULP_OVERFLOW_BUILD_MACOS_RUNS_ON_JSON || '["macos-15"]' }}
          # gh CLI auth for the overflow-busy-count probe.
          GH_TOKEN: ${{ github.token }}
        # Uses the shared resolver at tools/scripts/resolve_runs_on.py so the
        # same precedence (explicit input → repo var → provider fallback) is
        # reused by sanitizers.yml and any future workflow. See that script's
        # module docstring and tools/scripts/test_resolve_runs_on.py for the
        # build.yml parity cases.
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys
          from pathlib import Path

          REQUESTED = (os.environ.get("REQUESTED_PROVIDER") or "github-hosted").strip()
          EVENT_NAME = (os.environ.get("GITHUB_EVENT_NAME") or "").strip()
          # Events whose only job is to publish the GitHub-hosted Linux/Windows
          # caches. The macOS leg is excluded from their matrix: it runs on the
          # self-hosted Macs that serve the one required check in this repo, and
          # those Macs keep their caches on local disk — so a macOS leg here
          # would occupy the required gate's runners to save nothing.
          PUSH_ONLY_CACHE_EVENTS = ("push",)
          RESOLVER = ["python3", "tools/scripts/resolve_runs_on.py"]
          REPOSITORY = os.environ.get("GITHUB_REPOSITORY", "")

          def run(args):
              result = subprocess.run(
                  RESOLVER + args,
                  check=False,
                  capture_output=True,
                  text=True,
                  env=os.environ.copy(),
              )
              if result.returncode != 0:
                  sys.stderr.write(result.stderr)
                  sys.exit(result.returncode)
              return result.stdout

          # ─── macOS overflow routing ──────────────────────────────────────
          # When the local self-hosted Mac runner is saturated, route the
          # macOS leg to free GitHub-hosted macos-15 instead of waiting in
          # the local queue. Precedence is "operator wins,
          # then overflow, then local default" — see the env-block comment
          # above for the layer ordering. Failures of the busy probe fall
          # back to local (the safer choice — overflow is an optimization,
          # not a correctness requirement).
          #
          # Implementation note: `gh api .../actions/runners` requires
          # repo `Administration: Read` scope, which the default workflow
          # GITHUB_TOKEN does not have; falling back to BUSY=0 on that
          # endpoint failure silently disables overflow. Counting
          # Build-and-Test runs via `actions/runs?status=in_progress|queued`
          # also over-counts:
          # if many BAT runs are queued and all are already routing to
          # macos-15 overflow, local sits idle yet the probe still reads
          # as saturated and routes new PRs to overflow too. Local
          # participation then drops to zero during deep queues.
          #
          # This probe counts only the macOS legs ACTUALLY OCCUPYING a
          # local M1 right now: a Build-and-Test
          # macOS job whose `status == "in_progress"` AND whose `labels`
          # include the local self-hosted label. Everything else counts
          # as 0:
          #   - A `queued` Build-and-Test run has dispatched nothing, so
          #     it cannot be holding an M1. We do NOT enumerate queued
          #     runs at all.
          #   - A run that is `in_progress` but whose macOS matrix job is
          #     not yet registered (matrix not expanded) or is still
          #     `queued` is NOT occupying an M1 — count 0.
          #
          # Counting in_progress + queued runs pessimistically treats
          # not-yet-registered macOS jobs as local-busy. During a deep
          # Actions queue that over-counts catastrophically: undispatched
          # queued runs all read as "local-busy", BUSY blows past the
          # threshold, every new macOS leg routes to github-hosted
          # overflow, and the local M1 runners sit idle while macOS work
          # starves on the contended github-hosted pool.
          #
          # The fix deliberately INVERTS the old pessimism: an
          # unregistered / queued / API-blip macOS job counts 0, not 1.
          # The probe errs toward "use local". Slightly oversubscribing
          # the M1s (a 3rd macOS leg briefly queues behind 2 running
          # ones) is FAR less harmful than the failure it replaces (M1s
          # 100% idle while everything piles onto a jammed github-hosted
          # pool). Under-count, never over-count.
          #
          # API cost: 1 list-call + N per-run-jobs calls, N bounded by
          # the count of in_progress Build-and-Test runs (small — the
          # `concurrency` group cancels superseded runs). Probe failure
          # still falls back to BUSY=0 (consistent with "err toward
          # local").
          def _count_busy_local_mac_runners() -> int:
              if not REPOSITORY:
                  return 0
              current_run_id = os.environ.get("GITHUB_RUN_ID", "")
              local_label = (os.environ.get("LOCAL_MAC_RUNNER_LABEL") or "self-hosted").strip()

              def _list_in_progress_runs():
                  # Only `in_progress` runs can have a macOS job occupying
                  # an M1. A `queued` run has dispatched nothing, so it is
                  # never busy — we deliberately do not list it.
                  result = subprocess.run(
                      [
                          "gh", "api",
                          f"repos/{REPOSITORY}/actions/runs?status=in_progress&per_page=100",
                          "--jq",
                          (
                              f'[.workflow_runs[] '
                              f'| select(.name == "Build and Test") '
                              f'| select((.id | tostring) != "{current_run_id}") '
                              f'| .id] | .[]'
                          ),
                      ],
                      check=True,
                      capture_output=True,
                      text=True,
                      timeout=15,
                  )
                  return [line.strip() for line in result.stdout.splitlines() if line.strip()]

              def _macos_leg_running_on_local(run_id: str) -> bool:
                  # True ONLY if this run has a macOS Build-and-Test job
                  # that is RIGHT NOW `status == "in_progress"` AND whose
                  # `labels` array contains the local self-hosted label
                  # (exact membership, not substring). A queued macOS job
                  # (not started), a not-yet-registered macOS job (matrix
                  # not expanded), or a completed one is NOT occupying an
                  # M1 → counts 0. This inverts the old pessimistic
                  # not-yet-registered → BUSY fallback that starved the
                  # local runners during deep queues.
                  try:
                      result = subprocess.run(
                          [
                              "gh", "api",
                              f"repos/{REPOSITORY}/actions/runs/{run_id}/jobs",
                              "--jq",
                              (
                                  f'[.jobs[] '
                                  f'| select(.name | startswith("macOS")) '
                                  f'| select(.status == "in_progress") '
                                  f'| select((.labels // []) '
                                  f'| index({json.dumps(local_label)})) '
                                  f'| .id] | length'
                              ),
                          ],
                          check=True,
                          capture_output=True,
                          text=True,
                          timeout=15,
                      )
                      count_text = (result.stdout or "").strip()
                      return int(count_text) > 0 if count_text else False
                  except (subprocess.SubprocessError, ValueError):
                      # API blip: under-count (count 0). Erring toward
                      # "use local" is the safe failure mode — briefly
                      # oversubscribing 2 M1s beats starving them idle.
                      return False

              try:
                  ids = _list_in_progress_runs()
                  local_busy = sum(1 for rid in ids if _macos_leg_running_on_local(rid))
                  sys.stderr.write(
                      f"resolve-provider: in_progress BAT runs other than self: "
                      f"{len(ids)} total, {local_busy} with a macOS leg "
                      f"in_progress on a local M1\n"
                  )
                  return local_busy
              except (subprocess.SubprocessError, ValueError) as exc:
                  sys.stderr.write(
                      f"resolve-provider: local-busy probe failed; "
                      f"falling back to BUSY=0. ({exc})\n"
                  )
                  return 0

          def _count_idle_local_runners() -> int:
              # Capacity-aware routing (#3299). The busy-run-count heuristic
              # above estimates DEMAND (how many other runs are using a local
              # macOS leg). This measures SUPPLY: how many self-hosted macOS
              # runners carrying the local label are online AND not busy RIGHT
              # NOW. The two are not interchangeable — the demand heuristic
              # with a fixed threshold of 2 overflowed a 3rd leg to the
              # github-hosted pool (saturated / ARM-incompatible — it cannot
              # pass the gate) even while a 3rd Studio and the M5 sat idle.
              # When real idle local supply exists we must never overflow.
              #
              # Failure mode is deliberately "unknown" (-1), NOT 0: a probe
              # blip must fall back to the demand heuristic, never silently
              # force-overflow OR force-local on bad data.
              if not REPOSITORY:
                  return -1
              local_label = (os.environ.get("LOCAL_MAC_RUNNER_LABEL") or "self-hosted").strip()
              try:
                  result = subprocess.run(
                      [
                          "gh", "api",
                          f"repos/{REPOSITORY}/actions/runners?per_page=100",
                          "--jq",
                          (
                              f'[.runners[] '
                              f'| select(.status == "online") '
                              f'| select(.busy == false) '
                              f'| select(([.labels[].name] // []) '
                              f'| index({json.dumps(local_label)}))] | length'
                          ),
                      ],
                      check=True,
                      capture_output=True,
                      text=True,
                      timeout=15,
                  )
                  text = (result.stdout or "").strip()
                  return int(text) if text else 0
              except (subprocess.SubprocessError, ValueError) as exc:
                  sys.stderr.write(
                      f"resolve-provider: idle-local-runner probe failed; "
                      f"falling back to the busy-count heuristic. ({exc})\n"
                  )
                  return -1

          workflow_dispatch_selector = (
              os.environ.get("WORKFLOW_DISPATCH_MACOS_SELECTOR") or ""
          ).strip()
          overflow_macos_selector = (
              os.environ.get("OVERFLOW_MACOS_RUNS_ON_JSON") or ""
          ).strip()
          # "local-only" is the explicit off switch for overflow. An empty
          # repo variable cannot express this — GitHub treats unset and
          # empty identically, and the env default re-fills it with
          # macos-15 — so operators disable overflow with the sentinel
          # instead. Treat it as "no overflow selector" → stay local.
          if overflow_macos_selector == "local-only":
              overflow_macos_selector = ""
          local_macos_selector = (
              os.environ.get("LOCAL_MACOS_RUNS_ON_JSON") or ""
          ).strip()
          try:
              overflow_threshold = int(
                  (os.environ.get("LOCAL_MAC_OVERFLOW_THRESHOLD") or "2").strip()
              )
          except ValueError:
              overflow_threshold = 2

          if workflow_dispatch_selector:
              macos_route = "operator-override"
              chosen_macos_selector = workflow_dispatch_selector
          elif overflow_macos_selector and EVENT_NAME in ("pull_request", "workflow_dispatch"):
              # Overflow applies to pull_request AND workflow_dispatch so
              # `shipyard pr` (which dispatches via workflow_dispatch) gets
              # the same routing — otherwise ship cycles always pin local.
              # The explicit-override path above still wins; this branch
              # only fires when the operator didn't supply a selector.
              idle_local = _count_idle_local_runners()
              if idle_local > 0:
                  # Capacity-aware (#3299): genuine idle local supply exists,
                  # so never overflow to the github-hosted pool — claim it.
                  macos_route = f"local (IDLE_LOCAL={idle_local} > 0)"
                  chosen_macos_selector = local_macos_selector
              else:
                  # No known idle local supply (all busy, or the probe came
                  # back unknown=-1). Fall back to the demand heuristic for
                  # the overflow decision, preserving prior behavior exactly.
                  busy = _count_busy_local_mac_runners()
                  if busy >= overflow_threshold:
                      macos_route = (
                          f"overflow (IDLE_LOCAL={idle_local}, "
                          f"BUSY={busy} >= {overflow_threshold})"
                      )
                      chosen_macos_selector = overflow_macos_selector
                  else:
                      macos_route = (
                          f"local (IDLE_LOCAL={idle_local}, "
                          f"BUSY={busy} < {overflow_threshold})"
                      )
                      chosen_macos_selector = local_macos_selector
          else:
              # No overflow target configured. Stay local.
              macos_route = "local (default)"
              chosen_macos_selector = local_macos_selector

          os.environ["EXPLICIT_MACOS_RUNNER_SELECTOR_JSON"] = chosen_macos_selector
          print(
              f"resolve-provider: macOS route = {macos_route}; "
              f"selector = {chosen_macos_selector or '(empty → falls through to provider mode)'}",
              file=sys.stderr,
          )

          # The matrix leg renders `[<provider>]` in its name; reflect the
          # real macOS route rather than the global REQUESTED provider.
          if macos_route.startswith("overflow"):
              macos_provider = "github-hosted"
          elif macos_route == "operator-override":
              macos_provider = "operator"
          else:
              macos_provider = "local"

          linux_runs_on = run([
              "--target-name", "Linux (x64)",
              "--mode", "provider",
              "--github-hosted-label", "ubuntu-latest",
              "--explicit-env", "EXPLICIT_LINUX_RUNNER_SELECTOR_JSON",
              "--namespace-env", "NAMESPACE_LINUX_RUNS_ON_JSON",
              "--namespace-setting-name", "PULP_NAMESPACE_BUILD_LINUX_RUNS_ON_JSON",
          ])
          # Windows routes through the provider resolver, but it does NOT read
          # PULP_LOCAL_WINDOWS_RUNS_ON_JSON on PRs. That local lane is currently
          # Windows ARM64 on QEMU, useful as a smoke target but not an x64 gate.
          # Keep functional tests on the stable VS 2022 image. windows-latest
          # can change compiler and CRT generations in place; the dedicated
          # release-path gate below covers that moving toolchain without making
          # the authoritative runtime suite depend on an unpinned image.
          windows_runs_on = run([
              "--target-name", "Windows (x64)",
              "--mode", "provider",
              "--github-hosted-label", "windows-2022",
              "--explicit-env", "EXPLICIT_WINDOWS_RUNNER_SELECTOR_JSON",
              "--namespace-env", "NAMESPACE_WINDOWS_RUNS_ON_JSON",
              "--namespace-setting-name", "PULP_NAMESPACE_BUILD_WINDOWS_RUNS_ON_JSON",
          ])
          windows_provider = REQUESTED
          # macOS leg uses `mode=provider` (same as Linux + Windows) so the
          # explicit selector env (EXPLICIT_MACOS_RUNNER_SELECTOR_JSON, which
          # falls back to the PULP_LOCAL_MACOS_RUNS_ON_JSON repo var) is
          # honored regardless of REQUESTED_PROVIDER.
          #
          # Provider mode honors the explicit selector env even when the
          # requested provider is github-hosted. Keep this leg in provider mode:
          # `optional-namespace` ignores the explicit env under the default
          # github-hosted provider and can fall through to macos-15 instead of
          # the configured local self-hosted selector.
          #
          # Provider mode emits the github-hosted-label fallback ("macos-15")
          # when no explicit / namespace selector resolves, so the resolver
          # output is always non-empty and the matrix entry is always present.
          macos_runs_on = run([
              "--target-name", "macOS (ARM64)",
              "--mode", "provider",
              "--github-hosted-label", "macos-15",
              "--explicit-env", "EXPLICIT_MACOS_RUNNER_SELECTOR_JSON",
              "--namespace-env", "OVERFLOW_MACOS_RUNS_ON_JSON",
              "--namespace-setting-name", "PULP_OVERFLOW_BUILD_MACOS_RUNS_ON_JSON",
          ])

          include = []
          if EVENT_NAME not in PUSH_ONLY_CACHE_EVENTS:
              include.append({
                  "key": "macos",
                  "name": "macOS (ARM64)",
                  "runs_on_json": macos_runs_on,
                  "provider": macos_provider,
              })
          else:
              print(
                  f"resolve-provider: {EVENT_NAME} event — macOS leg omitted "
                  "(cache-warming run; macOS caches live on local disk)",
                  file=sys.stderr,
              )
          # Windows is advisory, GitHub-hosted, and slow, and a run carries four
          # Windows jobs (this leg plus the three compile gates below). The repo
          # gets a fixed pool of concurrent GitHub-hosted jobs, so a handful of
          # simultaneously open PRs fills nearly every slot with advisory Windows
          # work and starves the one REQUIRED hosted check
          # (`Build + prove + (owner-gated) deploy`, ubuntu-latest). A merge-queue
          # entry then sits in AWAITING_CHECKS until its check-response timeout
          # expires and gets evicted, so nothing lands at all.
          #
          # Windows therefore runs where it actually gates: the serial
          # `merge_group` validation, which builds PR ∪ main and is strictly
          # better coverage than the PR head. `push` keeps it for Windows
          # ccache warming, and workflow_dispatch keeps it for explicit reruns.
          # PR heads keep macOS (self-hosted) and Linux for fast signal.
          if EVENT_NAME != "pull_request":
              include.append({
                  "key": "windows",
                  "name": "Windows (x64)",
                  "runs_on_json": windows_runs_on,
                  "provider": windows_provider,
              })
          else:
              print(
                  "resolve-provider: pull_request event — Windows leg omitted "
                  "(gated in the merge queue; keeps hosted concurrency free for "
                  "the required ubuntu check)",
                  file=sys.stderr,
              )
          include.append({
              "key": "linux",
              "name": "Linux (x64)",
              "runs_on_json": linux_runs_on,
              "provider": REQUESTED,
          })

          matrix = {"include": include}

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              handle.write(f"provider={REQUESTED}\n")
              handle.write(f"matrix_json={json.dumps(matrix)}\n")
          PY

  # ── Change classifier ────────────────────────────────────────────────────
  # Decides whether this PR needs the native build matrix at all. A PR that
  # touches only docs / markdown / git-hooks / Shipyard config does not need
  # a Skia/Dawn compile on any platform — the `build` matrix and
  # `windows-msvc-release-gate` are skipped at the job level (no runner is
  # ever allocated), and the `macos`/`linux`/`windows` alias jobs report a
  # fast green from Ubuntu. Fail-closed: tools/scripts/classify_changes.py
  # treats any uncertainty as "native build required". See that script's
  # module docstring + tools/scripts/test_classify_changes.py.
  classify:
    # Same PULP_PREAMBLE_RUNS_ON_JSON toggle as resolve-provider: keep the
    # required-gate preamble off the saturated GitHub-hosted pool when opted in.
    runs-on: ${{ fromJSON(vars.PULP_PREAMBLE_RUNS_ON_JSON || '"ubuntu-latest"') }}
    outputs:
      native_build_required: ${{ steps.classify.outputs.native_build_required }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: false
      - id: classify
        # The base is event-dependent: a PR diffs its pinned target-branch sha,
        # a push diffs the tip it moved away from. `origin/main` is correct for
        # neither — on a push it resolves to HEAD itself and the diff is always
        # empty. See tools/scripts/resolve_classify_base.py for the full
        # contract and tools/scripts/test_resolve_classify_base.py for the cases.
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          base="$(python3 tools/scripts/resolve_classify_base.py)"
          python3 tools/scripts/classify_changes.py --mode=diff --base "$base"

  build:
    needs: [resolve-provider, classify]
    # Skip the entire native build matrix (no runner allocated) when the PR
    # touches no C++/Swift build input. The macos/linux/windows alias jobs
    # below still run and report.
    if: needs.classify.outputs.native_build_required == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-provider.outputs.matrix_json) }}

    runs-on: ${{ fromJSON(matrix.runs_on_json) }}
    # All legs named uniformly `<name> [<provider>]`. The required `macos`
    # check is now provided by the dedicated `macos` alias job below, not by
    # this matrix leg — so the leg no longer self-names `macos`.
    name: ${{ format('{0} [{1}]', matrix.name, matrix.provider) }}
    env:
      # Self-hosted macOS keeps the workspace warm between workflows.
      # Keep the ordinary build matrix out of sanitizer-owned build dirs so
      # cached CMake flags such as -fsanitize=address cannot bleed into it.
      PULP_BUILD_DIR: build-${{ matrix.key }}
      # ── ccache correctness overrides ─────────────────────────────────────
      # The self-hosted macOS runners' service env (~/actions-runner-*/.env)
      # sets CCACHE_DEPEND=true with the default compiler_check=mtime on a
      # ccache shared across all three runners. Depend mode skips the
      # preprocessor and trusts the compiler's dependency manifest; combined
      # with mtime-only compiler keying on a shared cache, a stale/false-hit
      # object gets served and corrupts unrelated TUs at once — observed as a
      # pure function (resolve_checkpoint_url) returning "" and other
      # change-unrelated tests failing on every PR while clean local Debug AND
      # Release builds pass. Build-dir guards do not touch ccache, so force
      # the safe path here (job env overrides the
      # runner-service .env for these steps):
      #   - compiler_check=content → key the compiler by content, not mtime;
      #     this also changes the cache-key namespace, so the existing
      #     contaminated mtime-keyed entries are never hit (self-cleaning).
      #   - CCACHE_NODEPEND=true → disable depend mode (the actual culprit).
      #     ccache rejects `CCACHE_DEPEND=false` ("invalid boolean … did you
      #     mean CCACHE_NODEPEND=true?"); the negated NO-form is the env spelling.
      #     Direct mode stays ON (fast path) — it hashes the source + include
      #     manifest and is correct once depend mode is off and the compiler is
      #     content-keyed.
      #   - sloppiness=time_macros only (pulp uses no precompiled headers, so
      #     pch_defines was inert).
      CCACHE_COMPILERCHECK: content
      CCACHE_NODEPEND: "true"
      CCACHE_SLOPPINESS: time_macros

    steps:
      # `lfs: false` — pulp's `core.hooksPath = .githooks` (set by
      # setup.sh / install-githooks.sh per the repo's hook convention)
      # conflicts with checkout@v5's internal `git lfs install` on
      # self-hosted runners that retain prior workspace state. Symptom:
      # `git failed with exit code 2` followed by "run git lfs update
      # --force" advice in the runner log. Skia binaries are NOT in LFS
      # for this repo — they're downloaded from a mirror by setup.sh's
      # bootstrap step (`./setup.sh --ci --deps-only` below). Skipping
      # checkout's LFS pull is therefore safe.
      - uses: actions/checkout@v5
        with:
          lfs: false
          # Self-hosted runner reuses its workspace across runs so ccache,
          # FetchContent caches, and CMake configure persist between PRs.
          # GitHub-hosted runners get a fresh VM each run anyway, so the
          # default `clean: true` is wasted there too — but explicit makes
          # the intent obvious. Net win: 5-10× faster on local mac on the
          # 2nd+ run of any PR (cache + build dir stay warm).
          clean: ${{ contains(matrix.runs_on_json, 'self-hosted') == false }}

      - name: Set up Namespace macOS cache
        if: runner.os == 'macOS' && contains(matrix.runs_on_json, 'namespace-profile')
        uses: ./.github/actions/setup-namespace-macos-cache

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          # chrome/m144 Skia exposes fontconfig symbols
          # (`FcInitLoadConfigAndFonts` et al.) that earlier Skia releases
          # hid. Without the dev package,
          # `pkg_check_modules(FONTCONFIG fontconfig)` in
          # core/canvas/CMakeLists.txt comes up empty and the Linux link
          # step fails. Mirrors the matching fix in release-cli.yml.
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libdbus-1-dev \
            libdrm-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libgbm-dev \
            libgl1-mesa-dev \
            libjack-jackd2-dev \
            libx11-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxrender-dev \
            libxss-dev \
            libxtst-dev \
            libwayland-dev \
            wayland-protocols \
            ccache

      # ── Namespace cache ─────────────────────────────────────────────────
      # Namespace cache volumes persist across runs on the same workspace,
      # cutting brew-install latency and ccache miss rates substantially.
      # Detection: Namespace selectors land in matrix.runs_on_json as
      # either "namespace-profile-…" (the
      # vars.PULP_NAMESPACE_BUILD_*_RUNS_ON_JSON form configured today)
      # OR direct machine labels like "nscloud-macos-tahoe-arm64-6x14"
      # (documented in docs/guides/local-ci.md as an alternative).
      # A single "namespace" substring misses the nscloud-* form, so we
      # check both prefixes.
      #
      # macOS-only restriction: the action hard-errors when run on a
      # Namespace profile without cache volumes configured
      # ("nscloud-cache-action requires a cache volume to be configured").
      # Cache volumes are only configured for the
      # macOS profile, and the cached paths here (brew, ~/Library/…)
      # are macOS-specific anyway. Windows uses choco + a different
      # ccache path, so it doesn't benefit from this step regardless.
      #
      # No-op on self-hosted Mac (already keeps caches on local disk)
      # and github-hosted runners (have actions/cache).
      - name: Namespace cache (brew + ccache + Pulp FetchContent)
        if: runner.os == 'macOS' && (contains(matrix.runs_on_json, 'namespace') || contains(matrix.runs_on_json, 'nscloud'))
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: brew
          path: |
            ~/Library/Caches/ccache
            ~/Library/Caches/Pulp/fetchcontent-src

      # Namespace macOS runners come up with a stale Homebrew config.
      # Without this `brew update`, any subsequent `brew install` fails
      # fast with: "You have disabled automatic updates and have not
      # updated today. Do not report this issue until you've run
      # `brew update` and tried again."
      # Local self-hosted Macs already keep brew warm between runs, but
      # `brew update --quiet` is idempotent and cheap there; cheap
      # enough to run unconditionally on every macOS leg.
      - name: brew update (macOS)
        if: runner.os == 'macOS'
        run: brew update --quiet

      - name: Install ccache (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ccache || {
            brew update
            brew install ccache
          }

      - name: Install ccache (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        run: choco install ccache --no-progress -y

      # ── Caches (#420) ──────────────────────────────────────────────────
      # The local macOS runner keeps these paths on disk between jobs.
      # Avoid round-tripping multi-GB compiler/source caches through
      # GitHub's cloud cache there; GitHub-hosted runners restore main's
      # cache and only non-PR main runs publish fresh cache entries.
      - name: Restore FetchContent sources (GitHub-hosted)
        if: runner.os != 'macOS' || runner.environment == 'github-hosted'
        id: fetchcontent-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/Library/Caches/Pulp/fetchcontent-src
            ~/.cache/Pulp/fetchcontent-src
            ~/AppData/Local/Pulp/Cache/fetchcontent-src
          key: ${{ runner.os }}-${{ matrix.key || 'build' }}-fetchcontent-${{ hashFiles('setup.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.key || 'build' }}-fetchcontent-

      - name: Restore ccache (GitHub-hosted)
        if: runner.os != 'macOS' || runner.environment == 'github-hosted'
        id: ccache-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/Library/Caches/ccache
            ~/.cache/ccache
            ~/AppData/Local/ccache
          key: ${{ runner.os }}-${{ matrix.key || 'build' }}-ccache-${{ hashFiles('**/CMakeLists.txt', 'tools/cmake/*.cmake') }}-${{ github.ref }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.key || 'build' }}-ccache-${{ hashFiles('**/CMakeLists.txt', 'tools/cmake/*.cmake') }}-
            ${{ runner.os }}-${{ matrix.key || 'build' }}-ccache-

      - name: Bootstrap repository dependencies
        run: ./setup.sh --ci --deps-only
        shell: bash

      # Save scope is deliberately narrower than restore scope: GitHub-hosted
      # Linux/Windows only, and only on a push to main.
      #   - `runner.environment == 'github-hosted' && runner.os != 'macOS'`:
      #     the self-hosted Macs keep these caches on local disk between jobs,
      #     so uploading multi-GB archives from them would slow the required
      #     gate down to buy nothing. The restore-side disjunction
      #     (`runner.os != 'macOS' || ...`) is wrong here — it would re-admit
      #     any self-hosted non-macOS runner to the upload path.
      #   - `github.event_name == 'push'`: a cache written by a PR run is
      #     scoped to that PR's ref and invisible to other PRs. Only a push to
      #     the default branch publishes an entry every PR can restore.
      #     `!= 'pull_request'` was the old spelling and is also true on
      #     merge_group and workflow_dispatch, which is not what we mean.
      - name: Save FetchContent sources (main push, GitHub-hosted Linux/Windows)
        if: runner.environment == 'github-hosted' && runner.os != 'macOS' && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.fetchcontent-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/Library/Caches/Pulp/fetchcontent-src
            ~/.cache/Pulp/fetchcontent-src
            ~/AppData/Local/Pulp/Cache/fetchcontent-src
          key: ${{ steps.fetchcontent-cache.outputs.cache-primary-key }}

      - name: Fetch prebuilt Skia (macOS)
        # FindSkia.cmake needs
        # external/skia-build/build/mac-gpu/lib/Release/libskia.a. The
        # LFS-declared Skia binaries are not committed, so a fresh
        # checkout has only headers/pointers and Configure fails the
        # PULP_HAS_SKIA gate (examples-ON / GPU builds — e.g.
        # examples/design-tool). fetch_skia_for_release.py pulls the
        # pinned, sha256-verified asset from tools/deps/manifest.json.
        # The script is idempotent: it stamps the unpacked asset sha and
        # skips the download when the stamp matches the current manifest
        # pin — and re-fetches when the pin changes — so a self-hosted
        # runner (clean: false) reuses Skia between builds without ever
        # building against a stale pin.
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/scripts/fetch_skia_for_release.py darwin-arm64

      # ── Tier-0 Intel canary (docs/guides/intel-support.md) ────────────────
      # Cheap cross-arch (x86_64) portability early-warning that rides inside
      # the already-running ARM macOS job. Two halves:
      #   (1) the static lint (sub-second; changed-files on PRs, whole-tree on
      #       push) — catches the build-system arch class the compile can't;
      #   (2) a GPU-OFF, x86_64-thin compile of the arch-sensitive TU set (the
      #       proven sanitizer-matrix config — no Skia download, ~3-5 min) —
      #       catches `#if` gating that drops the SSE/scalar fallback.
      # Gated on the PULP_INTEL_CANARY repo variable so forks (which default
      # OFF) never pay for it; danielraffel/pulp sets it to `1`. It is a
      # canary, never a substitute for the Tier-2 nightly Intel build.
      - name: Intel canary — lint + x86_64 GPU-off compile
        if: runner.os == 'macOS' && vars.PULP_INTEL_CANARY == '1'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            echo "Intel canary lint (changed vs ${base})"
            python3 tools/scripts/intel_canary_lint.py --mode=changed --base "${base}"
          else
            echo "Intel canary lint (whole tree)"
            python3 tools/scripts/intel_canary_lint.py --mode=tree
          fi
          echo "Intel canary x86_64 GPU-off compile (sanitizer-matrix config)"
          cmake -S . -B build-intel-canary \
            -DCMAKE_BUILD_TYPE=Release \
            -DPULP_ENABLE_GPU=OFF \
            -DPULP_BUILD_TESTS=OFF \
            -DPULP_BUILD_EXAMPLES=OFF \
            -DCMAKE_OSX_ARCHITECTURES=x86_64
          # pulp-signal is an INTERFACE (header-only) library, so its SIMD/DSP
          # TUs compile through pulp-signal-fft-backend (the real STATIC target).
          # This macOS leg resolves to PULP_LOCAL_MACOS_RUNS_ON_JSON — the shared
          # self-hosted Studios that host the required `macos` gate — so it must
          # take a governed *share*, not `-j$(sysctl -n hw.ncpu)` (every core).
          # The governor acquires a tartci lease on the Studio and falls back to
          # the tier-0 bound on a GitHub-hosted macos runner; it carries no -j.
          tools/ci/governed-build.sh cmake --build build-intel-canary \
            --target pulp-runtime pulp-signal-fft-backend pulp-platform pulp-state pulp-format

      - name: Ccache effective config (proof of override)
        if: always()
        shell: bash
        run: |
          # Proves the job-level ccache correctness overrides actually reached
          # this step's environment (vs the runner-service .env). Expect
          # compiler_check=content, depend_mode=false, direct_mode=false,
          # sloppiness=time_macros.
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-config 2>/dev/null \
              | grep -iE 'compiler_check|depend_mode|direct_mode|sloppiness|cache_dir' || true
          else
            echo "ccache not available; skipping config proof"
          fi

      - name: Configure
        # On PR and Shipyard workflow_dispatch validation, skip the examples tree
        # (PulpDrums / PulpSynth / PulpMpeSynth / PulpPluck /
        # AraPitchTracker × VST3/AU/CLAP format variants — the heavy
        # build targets). Core tests still build + run; example-local
        # tests registered from examples/*/CMakeLists.txt are deferred
        # with the plugin product bundles. Trades ~10-20 min per PR/ship
        # dispatch for the nightly / release lanes that still compile the
        # example/product bundles.
        # On workflow_dispatch, Shipyard PR validation also disables GPU:
        # the self-hosted macOS runner may not carry the pinned Skia archive,
        # and GPU release coverage lives in the release workflow. Keep
        # examples OFF there too so no-GPU validation does not link example
        # bundles that require the GPU plugin view host.
        run: |
          set -euo pipefail
          # macOS builds with Ninja — it schedules parallelism more
          # precisely and is meaningfully faster on the warm/incremental
          # builds that are the self-hosted M1's common case. Linux and
          # Windows keep their default generator. Self-hosted runners
          # reuse warm build dirs (clean: false), and CMake refuses to
          # reconfigure a dir created with a different generator, so the
          # build dir is recreated when its cached generator no longer
          # matches (one-time cost on the first Ninja run per runner;
          # the shared ccache stays warm regardless).
          gen=()
          cmake_extra=()
          if [ "${RUNNER_OS}" = "macOS" ]; then
            command -v ninja >/dev/null 2>&1 || brew install ninja
            gen=(-G Ninja)
            # ODR guard (see ~/.claude/skills/pulp-runner-ops): an interrupted
            # or cancelled prior build can leave partial object files in the warm
            # self-hosted build dir, mixing object layouts on the next
            # incremental build → heap corruption / SEGFAULTs in unrelated tests
            # (HttpStream, model_store, etc.). A sentinel marks a build
            # in-progress; if it survived from last time, the prior build did not
            # finish cleanly, so recreate the dir for a pristine rebuild (ccache
            # keeps the recompile fast; Skia at external/skia-build is untouched).
            if [ -f "$PULP_BUILD_DIR/.pulp-build-incomplete" ]; then
              echo "macOS Configure: prior build did not finish cleanly → recreating $PULP_BUILD_DIR"
              rm -rf "$PULP_BUILD_DIR"
            fi
            cache="$PULP_BUILD_DIR/CMakeCache.txt"
            if [ -f "$cache" ] && ! grep -q '^CMAKE_GENERATOR:INTERNAL=Ninja$' "$cache"; then
              echo "macOS Configure: build-dir generator changed → recreating $PULP_BUILD_DIR"
              rm -rf "$PULP_BUILD_DIR"
            fi
          fi
          if [ "${RUNNER_OS}" = "Windows" ]; then
            # MSBuild still evaluates some FetchContent subbuild paths through
            # legacy MAX_PATH-limited metadata. Keep the dependency subbuild
            # root short so nested wgpu prebuilt-populate targets configure
            # reliably on GitHub-hosted Windows runners.
            cmake_extra=(-DFETCHCONTENT_BASE_DIR="$PWD/fc")
          fi
          cmake_args=(-DCMAKE_BUILD_TYPE=Release -DPULP_BUILD_EXAMPLES=OFF)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            cmake_args+=(-DPULP_ENABLE_GPU=OFF)
          fi
          cmake -S . -B "$PULP_BUILD_DIR" "${gen[@]}" ${cmake_extra[@]+"${cmake_extra[@]}"} "${cmake_args[@]}"
          # Mark the build in-progress; the Build step clears it on success, so a
          # build interrupted/cancelled before completion is detected next run
          # (ODR guard above). Harmless on github-hosted (fresh dir each run).
          if [ "${RUNNER_OS}" = "macOS" ]; then
            mkdir -p "$PULP_BUILD_DIR" && : > "$PULP_BUILD_DIR/.pulp-build-incomplete"
          fi
        shell: bash

      - name: Build
        shell: bash
        run: |
          if [ "${RUNNER_OS}" = "macOS" ]; then
            bash test/cmake/test_ios_source_syntax.sh "$GITHUB_WORKSPACE" "$PULP_BUILD_DIR"
          fi
          cmake --build "$PULP_BUILD_DIR" --config Release
          # Build finished cleanly → clear the in-progress sentinel (ODR guard).
          rm -f "$PULP_BUILD_DIR/.pulp-build-incomplete"

      - name: Ccache stats
        if: always()
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats
          else
            echo "ccache not available; skipping stats"
          fi
        shell: bash

      # Same scope as the FetchContent save above. `cache-hit != 'true'` means
      # this refreshes once per distinct primary key: the key embeds
      # hashFiles('**/CMakeLists.txt', 'tools/cmake/*.cmake'), so a main push
      # republishes whenever the build definition moves and rides the existing
      # entry otherwise. GitHub cache keys are immutable, so a hit cannot be
      # overwritten in place regardless.
      - name: Save ccache (main push, GitHub-hosted Linux/Windows)
        if: runner.environment == 'github-hosted' && runner.os != 'macOS' && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.ccache-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/Library/Caches/ccache
            ~/.cache/ccache
            ~/AppData/Local/ccache
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

      - name: Test (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        # Keep one hung ctest entry from burning the full workflow timeout.
        # Long-running tests that need more time set their own CTest TIMEOUT.
        # PR validation excludes `slow` tests. Shipyard PR validation arrives
        # via workflow_dispatch, so it uses the same filter; otherwise slow
        # configure smokes can monopolize the single local macOS runner.
        # `-j8` (was `-j4`) — local self-hosted runner is M1 Max with 8 P-cores;
        # GH-hosted ubuntu/macos-15 runners also have ≥4 cores so this
        # doesn't regress their previous behavior. Higher parallelism
        # roughly halves test phase wall-time on multi-core hosts.
        run: |
          set -euo pipefail
          label_exclude="validation"
          # merge_group runs the same reduced set as a PR: a queued group is
          # exactly the PR content that already passed here, and the required
          # macos gate rides the serialized self-hosted runner — running the
          # heavier `slow` set only on push/nightly keeps the queue landable.
          #
          # `performance|bench|quality-lab` are ALSO excluded from the required
          # PR/merge_group gate (added 2026-07-21). These are RELATIVE-timing /
          # CPU-budget / benchmark tests (e.g. heritage-performance's
          # "Representative chain stays within the shipping CPU budget", which
          # asserts a ratio ≤ 2.0×1.05 vs an in-run baseline). They are robust to
          # STEADY load but NOT to the load VARIANCE created when the Studio runs
          # its 2 concurrent build VMs (cap=2) — a sibling VM's bursty compile
          # inflates the ratio past threshold → flake. A perf/ratio test cannot be
          # a required gate on a runner that (correctly) runs 2 concurrent VMs, so
          # it belongs in a dedicated cap=1 nightly/perf lane, not gating every
          # merge. They still run on push (informational). See
          # planning/org-flip-status.md §A.
          if [ "${{ github.event_name }}" = "pull_request" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "merge_group" ]; then
            label_exclude="validation|slow|performance|bench|quality-lab"
          fi
          exclude='STFT|VisualizationBridge|Clipboard|Toolbar add items'
          if [ "${RUNNER_OS}" = "macOS" ]; then
            # macOS self-hosted required gate stability:
            # these tests currently fail only on the local runner image
            # and block unrelated PRs behind the serialized macOS queue.
            # Keep them visible on Linux/Windows and in dedicated fixes.
            exclude="${exclude}|TextRunPlanner cache clear preserves shaped output contracts"
            exclude="${exclude}|TextRunPlanner captures scope generation and RTL base direction"
            exclude="${exclude}|MCP inspector tools map to expected inspector protocol methods"
            exclude="${exclude}|parse_cmake_project_version extracts VERSION from project\\(\\)"
            exclude="${exclude}|MCP pulp_motion_.* tools map to expected Motion\\..* methods"
            exclude="${exclude}|register_font_file resolves a custom family through Skia"
            exclude="${exclude}|FE0E forces text presentation"
            exclude="${exclude}|text_align center and right reflect cluster-aware width"
            exclude="${exclude}|mac harness scroll event carries non-zero deltas through PulpView"
            exclude="${exclude}|mac harness right-click reaches PulpView::rightMouseDown"
            exclude="${exclude}|pulp-mcp-launcher"
            # CoreAudio/StandaloneApp device-opening suites rely on the
            # PROCESSORS reservation in test/CMakeLists.txt to avoid
            # RT-thread starvation under -j8; keep that reservation if
            # those suites stay enabled here.
          fi
          if [ "${RUNNER_OS}" = "Linux" ]; then
            # Linux ARM64 PR runner: Skia is present, but the headless VM
            # exposes an incompatible Vulkan device
            # (/dev/dri/renderD128 -> VK_ERROR_INCOMPATIBLE_DRIVER) and no
            # DISPLAY. That makes visual/golden assertions fail as runner
            # capability checks, not as product regressions. Keep the rest of
            # the Linux suite green while GPU/visual coverage lives in the
            # dedicated visual lanes and macOS/Windows required gates.
            exclude="${exclude}|AudioInspectorPanel renders a non-empty headless snapshot"
            exclude="${exclude}|font v2 Slice 3\\.4"
            exclude="${exclude}|baked native materializer makes a faithful_svg tab_group an interactive overlay"
            exclude="${exclude}|ImageView value-driven silhouette fill scales with value"
            exclude="${exclude}|DesignFrameView renders"
            exclude="${exclude}|DesignTabGroup renders"
            exclude="${exclude}|DesignStepper renders"
            exclude="${exclude}|DesignStepper with a single option paints nothing"
            exclude="${exclude}|DesignFrameView paints"
            exclude="${exclude}|DesignFrameView tints"
            exclude="${exclude}|DesignFrameView xy_pad puck renders"
            exclude="${exclude}|DesignFrameView slides"
            exclude="${exclude}|DesignFrameView rotates"
            # Flaky on the ephemeral macOS CI VMs (offscreen GPU replay is
            # environment-sensitive: passes locally + on most runs, but
            # intermittently fails, evicting whole merge-queue batches and
            # disabling auto-merge on every PR in them). Quarantined until the
            # offscreen GPU-replay path is stabilized. Tracking: flaky-gpu-3327.
            exclude="${exclude}|Subtree cache composites a GPU image on the replay frame"
          fi
          # --repeat until-pass:2 retries a failed test once before failing the
          # leg, so a single timing-flake (e.g. a ReDoS-guard test slowed by
          # runner load) self-heals instead of reddening the required `macos`
          # gate and wedging auto-merge. Mirrors sanitizers.yml; each attempt is
          # still bounded by --timeout 120.
          ctest --test-dir "$PULP_BUILD_DIR" --output-on-failure --repeat until-pass:2 -C Release -LE "$label_exclude" -j8 --timeout 120 --exclude-regex "$exclude"

      - name: Surface ctest failures (non-Windows)
        # On a SELF-HOSTED runner the test step's log is not retrievable via
        # `gh run view --log` (you get only "Process completed with exit code
        # 8") and check-run annotations are empty — so a failing test is
        # invisible remotely. ctest's own result logs name it: dump them into
        # the job summary so the failing
        # test(s) + assertions show in the GitHub UI without host access.
        if: failure() && runner.os != 'Windows'
        shell: bash
        run: |
          tdir="$PULP_BUILD_DIR/Testing/Temporary"
          {
            echo "## ❌ ctest failures — ${{ matrix.name }} [${{ matrix.provider }}]"
            if [ -f "$tdir/LastTestsFailed.log" ]; then
              echo "### Failed tests"
              echo '```'; cat "$tdir/LastTestsFailed.log"; echo '```'
              echo "### Failing assertions (from LastTest.log)"
              echo '```'
              grep -aE "FAILED:|with expansion:|REQUIRE\(|REQUIRE_FALSE\(|CHECK\(" "$tdir/LastTest.log" 2>/dev/null | head -60
              echo '```'
            else
              echo "_No ctest result log at \`$tdir\` — the test step likely failed before ctest ran (configure/build/crash)._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          # Also echo failed-test names to the (locally-readable) job log.
          { [ -f "$tdir/LastTestsFailed.log" ] && { echo "=== ctest failed tests ==="; cat "$tdir/LastTestsFailed.log"; }; } || true

      - name: Upload ctest logs on failure
        # Full Testing/Temporary/ (LastTest.log, LastTestsFailed.log, …) as an
        # artifact — the authoritative per-test output, downloadable from the
        # run page even for self-hosted legs.
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: ctest-logs-${{ matrix.key }}
          path: ${{ env.PULP_BUILD_DIR }}/Testing/Temporary/
          if-no-files-found: ignore
          retention-days: 7

      - name: Test (Windows — UTF-8 code page wrapped)
        # Windows needs a UTF-8 console code page so ctest's child
        # processes receive filter args (test names with em-dashes
        # like "applies_if — empty expression") without CP-1252
        # mangling. Wrapping ctest inside `cmd /c "chcp 65001 & ctest"`
        # ensures the code page applies to the cmd subshell that
        # spawns test binaries — a plain bash `chcp.com 65001` ran
        # at the outer shell level but didn't propagate to ctest's
        # children on Namespace Windows.
        # Shipyard v0.38.0's UTF-8 prelude only covers commands
        # Shipyard dispatches via ssh-windows; GH Actions ctest
        # calls don't go through that path.
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          chcp 65001
          set "PULP_CTEST_LABEL_EXCLUDE=validation"
          if "%GITHUB_EVENT_NAME%"=="pull_request" set "PULP_CTEST_LABEL_EXCLUDE=validation|slow|windows-pr-quarantine|performance|bench|quality-lab"
          if "%GITHUB_EVENT_NAME%"=="workflow_dispatch" set "PULP_CTEST_LABEL_EXCLUDE=validation|slow|windows-pr-quarantine|performance|bench|quality-lab"
          if "%GITHUB_EVENT_NAME%"=="merge_group" set "PULP_CTEST_LABEL_EXCLUDE=validation|slow|windows-pr-quarantine|performance|bench|quality-lab"
          ctest --test-dir "%PULP_BUILD_DIR%" --output-on-failure --repeat until-pass:2 -C Release -LE "%PULP_CTEST_LABEL_EXCLUDE%" -j8 --timeout 120 --exclude-regex "STFT|VisualizationBridge|Clipboard|Toolbar add items|baked C.* exporter emits ownable C.* source artifacts|pulp-import-design handles literal file paths and rejects unsafe URLs"

      # Plugin bundle uploads only run on push/schedule events — pull_request
      # events skip example plugin builds (see Configure step's
      # PULP_BUILD_EXAMPLES=OFF gating) so there are no bundles to upload.
      - name: Upload plugin bundles (macOS)
        if: success() && runner.os == 'macOS' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v5
        with:
          name: plugins-${{ matrix.key }}
          path: |
            ${{ env.PULP_BUILD_DIR }}/VST3/*.vst3
            ${{ env.PULP_BUILD_DIR }}/CLAP/*.clap
            ${{ env.PULP_BUILD_DIR }}/AU/*.component
          retention-days: 7

      - name: Upload plugin bundles (Windows)
        if: success() && runner.os == 'Windows' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v5
        with:
          name: plugins-${{ matrix.key }}
          path: |
            ${{ env.PULP_BUILD_DIR }}/VST3/**/*.vst3
            ${{ env.PULP_BUILD_DIR }}/CLAP/**/*.clap
          retention-days: 7

      - name: Upload plugin bundles (Linux)
        if: success() && runner.os == 'Linux' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v5
        with:
          name: plugins-${{ matrix.key }}
          path: |
            ${{ env.PULP_BUILD_DIR }}/VST3/**/*.so
            ${{ env.PULP_BUILD_DIR }}/CLAP/**/*.so
          retention-days: 7

  # ── Windows MSVC release-path PR gate ────────────────────────────────────
  #
  # The main `build-and-test` matrix uses a test-oriented Windows configure
  # that differs from release-cli.yml's release configure. Without a matching
  # release-path gate, MSVC-specific errors (protected-member strictness,
  # WIN32_LEAN_AND_MEAN / COM header interactions, etc.) surface only AFTER a
  # tag is pushed, when release-cli.yml builds on windows-latest.
  #
  # This job mirrors release-cli.yml's CLI-build configure on windows-latest
  # for every PR so MSVC errors block merge instead of silently failing at
  # tag-push time. Build-only; no test step — release-cli.yml doesn't run
  # tests either, and the main matrix above already covers Windows tests.
  windows-msvc-release-gate:
    needs: classify
    # Not a cache producer; skip on cache-warming push runs.
    # Advisory Windows gate — merge-queue-gated, not PR-head-gated. See the
    # Windows-leg note in resolve-provider: four hosted Windows jobs per run
    # saturate the concurrent-hosted-job pool and starve the required
    # ubuntu check that the merge queue waits on.
    if: >-
      needs.classify.outputs.native_build_required == 'true'
      && github.event_name != 'push'
      && github.event_name != 'pull_request'
    runs-on: windows-latest
    name: Windows MSVC release-path gate
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Bootstrap repository dependencies
        run: ./setup.sh --ci --deps-only
        shell: bash

      - name: Configure (matches release-cli.yml)
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DPULP_BUILD_TESTS=OFF `
            -DPULP_ENABLE_AUDIO_PROBES=OFF `
            -DPULP_BUILD_WEBVIEW=ON
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release
        shell: pwsh

      - name: Verify installed SDK keeps WebView symbols
        shell: pwsh
        run: |
          cmake --install build --prefix sdk-staging --config Release
          if (!(Test-Path sdk-staging/lib/pulp-view.lib)) {
            throw "sdk-staging/lib/pulp-view.lib missing"
          }
          if (!(Test-Path sdk-staging/lib/pulp-view-core.lib)) {
            throw "sdk-staging/lib/pulp-view-core.lib missing"
          }
          python -c "from pathlib import Path; data = Path(r'sdk-staging/lib/pulp-view-core.lib').read_bytes(); assert b'WebViewPanel' in data; assert b'make_webview_embedded_resource_fetcher' in data"

  # ── Windows MIDI Services SDK compile-gate (advisory) ────────────────────
  #
  # Compile-verifies Pulp's opt-in WinRT MIDI 2.0 backend
  # (core/midi/platform/win/winrt_midi_device.cpp, gated by
  # PULP_HAS_WINRT_MIDI). That backend consumes the
  # Microsoft.Windows.Devices.Midi2 C++/WinRT projection, which ships
  # out-of-band with the Windows MIDI Services SDK (GitHub-only NuGet, NOT in
  # the base Windows SDK), so no other lane can compile it. We provision the
  # projection through Microsoft's official vcpkg port
  # `microsoft-windows-devices-midi2` (it downloads the SDK NuGet, runs
  # cppwinrt to generate the projection headers, and exports the
  # Microsoft::Windows::Devices::Midi2 CMake target). See tools/ci/midi2/.
  #
  # ADVISORY + OPT-IN: this is a standalone job, not part of the required
  # build matrix or any required alias, so it can never block merge — the
  # default Windows build (which does NOT set PULP_HAS_WINRT_MIDI) is
  # untouched. windows-latest ships vcpkg with VCPKG_ROOT preset, so no
  # vcpkg bootstrap is needed. Build-only (no test step): the Windows MIDI
  # Services runtime is absent in CI, so the backend can compile + link but
  # cannot exercise a live endpoint — compile-verification is the goal.
  windows-midi2-gate:
    needs: classify
    # Not a cache producer; skip on cache-warming push runs.
    # Advisory Windows gate — merge-queue-gated, not PR-head-gated. See the
    # Windows-leg note in resolve-provider: four hosted Windows jobs per run
    # saturate the concurrent-hosted-job pool and starve the required
    # ubuntu check that the merge queue waits on.
    if: >-
      needs.classify.outputs.native_build_required == 'true'
      && github.event_name != 'push'
      && github.event_name != 'pull_request'
    runs-on: windows-latest
    name: Windows MIDI Services SDK compile-gate (advisory)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Bootstrap repository dependencies
        run: ./setup.sh --ci --deps-only
        shell: bash

      # Provision the Midi2 projection via the official vcpkg port, then
      # configure Pulp with the vcpkg toolchain so
      # find_package(microsoft-windows-devices-midi2 CONFIG) resolves the
      # Microsoft::Windows::Devices::Midi2 IMPORTED target. VCPKG_ROOT is
      # preset on windows-latest. VCPKG_MANIFEST_DIR points at tools/ci/midi2,
      # which pins the port + baseline (see that dir's README).
      - name: Configure (PULP_HAS_WINRT_MIDI=ON via vcpkg midi2 projection)
        shell: pwsh
        run: |
          if (-not $env:VCPKG_ROOT) { $env:VCPKG_ROOT = "C:/vcpkg" }
          Write-Host "VCPKG_ROOT = $env:VCPKG_ROOT"
          cmake -S . -B build-midi2 `
            -DCMAKE_BUILD_TYPE=Release `
            -DPULP_BUILD_TESTS=OFF `
            -DPULP_BUILD_EXAMPLES=OFF `
            -DPULP_HAS_WINRT_MIDI=ON `
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            "-DVCPKG_MANIFEST_DIR=$($PWD.Path)/tools/ci/midi2" `
            -DVCPKG_MANIFEST_MODE=ON

      # Build only the pulp-midi target — the WinRT MIDI 2.0 TU lives there and
      # is the whole point of this gate. Avoids paying for the full tree.
      - name: Build pulp-midi (compile-verify the WinRT MIDI 2.0 backend)
        shell: pwsh
        run: cmake --build build-midi2 --config Release --target pulp-midi

  # ── Windows BLE MIDI compile-gate (advisory) ─────────────────────────────
  #
  # Compile-verifies Pulp's WinRT Bluetooth-LE scan backend
  # (core/midi/platform/win/ble_midi_win.cpp). Unlike the MIDI 2.0 gate
  # above, the BLE GATT / advertisement APIs (Windows.Devices.Bluetooth*)
  # ship in the BASE Windows SDK cppwinrt projection, so this gate needs NO
  # vcpkg / out-of-band NuGet provisioning — the default Windows build
  # already compiles the backend. This standalone job exists purely to give
  # the blind (macOS-authored) Windows TU a fast, isolated compile signal on
  # the pulp-midi target without waiting on the full build matrix.
  #
  # ADVISORY: standalone job, not part of the required build matrix or any
  # required alias, so it can never block merge.
  windows-ble-gate:
    needs: classify
    # Not a cache producer; skip on cache-warming push runs.
    # Advisory Windows gate — merge-queue-gated, not PR-head-gated. See the
    # Windows-leg note in resolve-provider: four hosted Windows jobs per run
    # saturate the concurrent-hosted-job pool and starve the required
    # ubuntu check that the merge queue waits on.
    if: >-
      needs.classify.outputs.native_build_required == 'true'
      && github.event_name != 'push'
      && github.event_name != 'pull_request'
    runs-on: windows-latest
    name: Windows BLE compile-gate (advisory)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Bootstrap repository dependencies
        run: ./setup.sh --ci --deps-only
        shell: bash

      # Default Windows configure — no PULP_HAS_WINRT_MIDI, no vcpkg. The BLE
      # backend compiles on the base SDK projection out of the box.
      - name: Configure (base Windows SDK — WinRT BLE backend)
        shell: pwsh
        run: |
          cmake -S . -B build-ble `
            -DCMAKE_BUILD_TYPE=Release `
            -DPULP_BUILD_TESTS=OFF `
            -DPULP_BUILD_EXAMPLES=OFF

      # Build only pulp-midi — the WinRT BLE TU lives there and is the whole
      # point of this gate. Avoids paying for the full tree.
      - name: Build pulp-midi (compile-verify the WinRT BLE backend)
        shell: pwsh
        run: cmake --build build-ble --config Release --target pulp-midi

  # ── Stable-name status aliases for advisory platforms ─────────────────────
  # Branch protection requires a context literally named `macos`. Keep it
  # independent of the advisory Linux/Windows matrix legs: this job polls
  # the macOS matrix leg and exits as soon as that leg reports, instead of
  # depending on the whole `build` matrix. Linux and Windows keep stable
  # advisory aliases for visibility only.

  # ── macos alias (REQUIRED branch-protection check) ───────────────────────
  # Always runs (`if: always()`) so the required `macos` context always
  # reports — never left pending. On a skip-safe PR (classify said no native
  # build) it reports a fast green from Ubuntu without touching the macOS
  # runner. On a code PR it mirrors the macOS matrix leg's conclusion.
  # Fail-closed: if the `classify` job itself did not succeed, the
  # native_build_required output is untrusted — this gate fails RED rather
  # than letting a PR merge on an unverified classification.
  macos:
    needs: [resolve-provider, classify]
    # The required `macos` check is itself this alias job, so it must ride the
    # same PULP_PREAMBLE_RUNS_ON_JSON toggle — otherwise the gate still queues on
    # ubuntu-latest to *report* the result even after the preamble is relocated.
    runs-on: ${{ fromJSON(vars.PULP_PREAMBLE_RUNS_ON_JSON || '"ubuntu-latest"') }}
    # Push runs are cache-warming only — no gate to report, and the macOS
    # leg they would poll for is deliberately absent from the matrix.
    if: always() && github.event_name != 'push'
    steps:
      - name: macOS leg outcome (required)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          classify_result="${{ needs.classify.result }}"
          if [ "$classify_result" != "success" ]; then
            echo "classify job did not succeed (result=$classify_result) — failing macos gate closed (required)"
            exit 1
          fi
          if [ "${{ needs.classify.outputs.native_build_required }}" != "true" ]; then
            echo "Skip-safe PR — no C++/Swift build input changed. macos gate ✓ (no native build)"
            exit 0
          fi
          conclusion=""
          max_attempts=360
          for attempt in $(seq 1 "$max_attempts"); do
            jobs_json="$(mktemp)"
            jobs_err="$(mktemp)"
            if gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" >"$jobs_json" 2>"$jobs_err"; then
              if ! conclusion=$(python3 - "$jobs_json" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as handle:
              payload = json.load(handle)
          for job in payload.get("jobs", []):
              if job.get("name", "").startswith("macOS"):
                  print(job.get("conclusion") or "")
                  break
          PY
              ); then
                echo "Could not parse jobs API response; retrying."
                conclusion=""
              fi
            else
              echo "Jobs API request failed; retrying."
              cat "$jobs_err"
              conclusion=""
            fi
            rm -f "$jobs_json" "$jobs_err"
            if [ -n "$conclusion" ] && [ "$conclusion" != "null" ]; then
              break
            fi
            echo "Waiting for macOS matrix leg to report (attempt $attempt/$max_attempts)..."
            sleep 10
          done
          echo "macOS leg conclusion: ${conclusion:-unknown}"
          if [ "$conclusion" = "success" ]; then
            echo "macOS leg green — macos gate ✓"
            exit 0
          fi
          echo "macOS leg ${conclusion:-not found} — failing macos gate (required)"
          exit 1

  linux:
    needs: [build, classify]
    # Rides the same PULP_PREAMBLE_RUNS_ON_JSON toggle as the required `macos`
    # alias, and for a sharper reason than symmetry: an alias job pinned to the
    # shared hosted pool can be starved of a runner indefinitely. Because it is
    # the last job in the run, the RUN never reaches a terminal state, so it holds
    # this ref's `concurrency` group forever — and with cancel-in-progress set, the
    # next push's run then sits at status `pending` with ZERO jobs and never
    # dispatches. That wedge is silent, survives re-pushes, and only clears by
    # cancelling the older run by hand. An advisory lane must not be able to strand
    # a pull request, so it reports from the self-hosted preamble instead.
    runs-on: ${{ fromJSON(vars.PULP_PREAMBLE_RUNS_ON_JSON || '"ubuntu-latest"') }}
    # Push runs are cache-warming only — no gate to report, and the macOS
    # leg they would poll for is deliberately absent from the matrix.
    if: always() && github.event_name != 'push'
    steps:
      - name: Linux leg outcome (advisory)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          classify_result="${{ needs.classify.result }}"
          if [ "$classify_result" != "success" ]; then
            echo "classify job did not succeed (result=$classify_result) — failing linux alias closed"
            exit 1
          fi
          if [ "${{ needs.classify.outputs.native_build_required }}" != "true" ]; then
            echo "Skip-safe PR — no C++/Swift build input changed. linux gate ✓ (no native build)"
            exit 0
          fi
          conclusion=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" \
            --jq '.jobs[] | select(.name | startswith("Linux")) | .conclusion' | head -1)
          echo "Linux leg conclusion: ${conclusion:-unknown}"
          if [ "$conclusion" = "success" ]; then
            echo "Linux leg green — linux gate ✓"
            exit 0
          fi
          # Linux is currently advisory per branch protection (only macOS
          # is required). This alias still surfaces RED so the GitHub UI
          # accurately reflects per-platform state, but it doesn't block
          # merge because branch protection no longer requires `linux`.
          # Operator-facing reminder: file linux failures via the
          # platform:linux + affects-only:non-macos label set (see
          # CLAUDE.md > Platform-focus policy when added).
          echo "Linux leg ${conclusion:-not found} — failing linux alias (advisory only; not required)"
          exit 1

  windows:
    needs: [build, windows-msvc-release-gate, classify]
    # Rides the same PULP_PREAMBLE_RUNS_ON_JSON toggle as the required `macos`
    # alias, and for a sharper reason than symmetry: an alias job pinned to the
    # shared hosted pool can be starved of a runner indefinitely. Because it is
    # the last job in the run, the RUN never reaches a terminal state, so it holds
    # this ref's `concurrency` group forever — and with cancel-in-progress set, the
    # next push's run then sits at status `pending` with ZERO jobs and never
    # dispatches. That wedge is silent, survives re-pushes, and only clears by
    # cancelling the older run by hand. An advisory lane must not be able to strand
    # a pull request, so it reports from the self-hosted preamble instead.
    runs-on: ${{ fromJSON(vars.PULP_PREAMBLE_RUNS_ON_JSON || '"ubuntu-latest"') }}
    # Push runs are cache-warming only — no gate to report, and the macOS
    # leg they would poll for is deliberately absent from the matrix.
    if: always() && github.event_name != 'push'
    steps:
      - name: Windows leg outcome (advisory)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          classify_result="${{ needs.classify.result }}"
          if [ "$classify_result" != "success" ]; then
            echo "classify job did not succeed (result=$classify_result) — failing windows alias closed"
            exit 1
          fi
          if [ "${{ needs.classify.outputs.native_build_required }}" != "true" ]; then
            echo "Skip-safe PR — no C++/Swift build input changed. windows gate ✓ (no native build)"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Windows runs in the merge queue, not on the PR head — windows alias ✓"
            echo "(advisory; the serial merge_group validation builds PR ∪ main on Windows before this lands)"
            exit 0
          fi
          conclusion=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" \
            --jq '.jobs[] | select(.name | startswith("Windows (x64)")) | .conclusion' | head -1)
          msvc_ok="${{ needs.windows-msvc-release-gate.result }}"
          echo "Windows matrix leg: ${conclusion:-unknown}"
          echo "Windows MSVC release-path: $msvc_ok"
          if [ "$conclusion" = "success" ] && [ "$msvc_ok" = "success" ]; then
            echo "Both Windows lanes green — windows gate ✓"
            exit 0
          fi
          # Windows is currently advisory (see Linux comment above).
          echo "Windows leg ${conclusion:-not found} or MSVC=$msvc_ok — failing windows alias (advisory only; not required)"
          exit 1
