name: JS packages build + test

on:
  push:
    branches: [main]
    paths:
      - 'packages/pulp-react/**'
      - 'packages/pulp-import-ir/**'
      - 'test/fixtures/anchor_vectors.json'
      - '.github/workflows/pulp-react-build.yml'

  schedule:
    - cron: '41 5 * * *'  # nightly de-starve safety net (see planning/fleet/2026-07-17-ci-destarve-analysis.md)
  workflow_dispatch: {}
concurrency:
  group: js-packages-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'schedule' || github.repository == 'danielraffel/pulp'
    runs-on: ubuntu-latest
    name: Build and test @pulp/react

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: packages/pulp-react/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: packages/pulp-react

      - name: Build
        run: npm run build
        working-directory: packages/pulp-react

      - name: Test (with coverage)
        # Measure-only Vitest coverage. The v8 lane emits Cobertura
        # XML under `packages/pulp-react/coverage/`; Codecov consumes
        # it via the upload step below. Threshold enforcement lives in
        # the canonical Coverage workflow, not this package build.
        run: npm run test:coverage
        working-directory: packages/pulp-react

      - name: Verify Cobertura XML exists
        # Mirror the assertion the native coverage lane uses. A silent
        # failure (e.g. v8 provider missing → vitest skips coverage but
        # exits 0) would otherwise upload nothing and the Codecov
        # dashboard would stay empty.
        shell: bash
        run: |
          xml=packages/pulp-react/coverage/cobertura-coverage.xml
          test -s "$xml" || {
            echo "::error::cobertura-coverage.xml is missing or empty."
            echo "::error::Vitest coverage step likely failed — check the 'Test (with coverage)' step above."
            exit 1
          }
          size=$(wc -c < "$xml")
          echo "cobertura-coverage.xml size: ${size} bytes"
          lines_valid=$(python3 -c "import xml.etree.ElementTree as E; print(E.parse('$xml').getroot().attrib.get('lines-valid', '0'))")
          if [ "${lines_valid}" = "0" ]; then
            echo "::error::cobertura-coverage.xml is structurally empty (lines-valid=0)."
            exit 1
          fi
          echo "cobertura-coverage.xml has lines-valid=${lines_valid}"

      - name: Upload pulp-react coverage artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pulp-react-coverage-${{ github.sha }}
          path: packages/pulp-react/coverage/cobertura-coverage.xml
          retention-days: 14
          if-no-files-found: warn

      - name: Upload pulp-react coverage to Codecov
        # PR-only upload. Push-to-main uploads live in coverage.yml so
        # Codecov's main branch record advances only from the canonical
        # Coverage workflow, not from this independent path-filtered
        # workflow when a native Coverage run was superseded before it
        # could upload its OS legs.
        if: always() && github.event_name == 'pull_request'
        uses: codecov/codecov-action@v5
        with:
          files: packages/pulp-react/coverage/cobertura-coverage.xml
          flags: pulp-react
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  import-ir:
    if: github.event_name != 'schedule' || github.repository == 'danielraffel/pulp'
    runs-on: ubuntu-latest
    name: Build and test @pulp/import-ir

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        # No `cache: npm` here — the package has no lockfile, and
        # actions/setup-node's npm cache keys off one.
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # `npm install`, not `npm ci` — see the cache note above.
        run: npm install --no-audit --no-fund
        working-directory: packages/pulp-import-ir

      - name: Build
        # test/build-output.test.ts asserts against dist/, so the bundle has
        # to exist before the suite runs.
        run: npm run build
        working-directory: packages/pulp-import-ir

      - name: Test
        # Includes the cross-language anchor conformance suite, which reads
        # test/fixtures/anchor_vectors.json from the repo root — the same
        # table pulp-test-design-import-anchors pins on the C++ side. Until
        # this job existed the package's vitest suite ran in no CI lane at
        # all, so TS-side anchor drift could land unnoticed.
        run: npm test
        working-directory: packages/pulp-import-ir
