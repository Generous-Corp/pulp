name: Version-at-Land (single-writer, push)

# Single-writer version assignment on main (T1.1 — see
# planning/2026-07-07-parallel-merge-land-coordination.md and
# docs/guides/version-at-land-cutover.md).
#
# LIVE (--push). On every push to main, drain the range since the last
# `Version-Bump-Applied` marker, assign each declared surface its next version
# from main's CURRENT value, commit `chore: bump versions` with a
# `Version-Bump-Applied:` marker (SSH-signed by the release bot), and push
# --ff-only with retry. That bump commit triggers auto-release.yml exactly as a
# hand-bump did before, so tagging + release are unchanged downstream.
#
# The concurrency group serialises runs (cancel-in-progress: false). Per Codex
# review a GitHub concurrency group is a serialiser, not a durable FIFO — so
# apply_and_push STILL recomputes from fresh origin/main and pushes --ff-only +
# retry (a loser re-syncs past the winner's marker and no-ops). Proven in
# tools/scripts/test_version_at_land.py (concurrency + idempotency).

on:
  push:
    branches: [main]
    # Deliberately NO `paths:` filter — run on EVERY push to main. A filter here
    # is a silent-loss hole: a fix/feat that touches only a surface path the
    # filter omits (e.g. `experimental/pulp-rs/**`, a live sdk trigger path in
    # versioning.json) would declare a `Version-Bump:` intent, merge, never
    # trigger this workflow, and — because the auto-release stranded detector
    # treats a pending intent as covered — never alarm. The drain is bounded by
    # the `Version-Bump-Applied` marker, so a push with no intent in range is a
    # cheap no-op (see test_version_at_land.py::test_non_trigger_change_is_noop);
    # correctness beats saving a few trivial ubuntu runs. The pending-intent
    # liveness alarm is the time-based backstop if this ever fails to run.
  # Supersession-immune safety net. GitHub holds only ONE queued run per
  # concurrency group; on a high-churn main every new push throws the bot's
  # queued run to the back and drops the previous one, so under hosted-runner
  # backlog the push-triggered drain can starve FOREVER — the exact death spiral
  # coverage.yml documents and fixed the same way (see its header). A scheduled
  # run lands in its OWN concurrency group (below), immune to push supersession,
  # so pending intent is always drained within the cadence.
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  # Event-scoped so a scheduled drain is never superseded by pushes (and vice
  # versa). Concurrent push+schedule drains are safe: apply_and_push is
  # --ff-only + Version-Bump-Applied-marker idempotent + recompute-per-retry, so
  # a loser re-syncs past the winner's marker and no-ops (test_version_at_land.py
  # concurrency proof). No double-bump.
  group: version-at-land-${{ github.event_name }}
  cancel-in-progress: false

permissions:
  contents: write  # the single-writer bot pushes the `chore: bump versions` commit

jobs:
  drain-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0  # need history to find the last applied marker
          persist-credentials: true
          # RELEASE_BOT_TOKEN if present so the pushed commit re-triggers CI
          # checks gated to non-GITHUB_TOKEN pushes; GITHUB_TOKEN for bootstrap.
          # (post-tag-sync.yml already uses this exact pattern to push to main.)
          token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure release bot SSH signing
        shell: bash
        env:
          RELEASE_BOT_SSH_SIGNING_KEY: ${{ secrets.RELEASE_BOT_SSH_SIGNING_KEY }}
        run: bash tools/scripts/configure_release_bot_ssh_signing.sh

      - name: Assign versions (single-writer push)
        run: |
          # --push recomputes from a fresh origin/main, prefers the
          # `Version-Bump-Applied` marker, and pushes `chore: bump versions`
          # --ff-only with retry. `--base` is only the first-run FALLBACK before
          # any marker exists; `github.event.before` bounds it to this push.
          python3 tools/scripts/version_at_land.py --push \
              --base "${{ github.event.before }}"
