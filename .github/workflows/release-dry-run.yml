name: Release Dry-Run

# P9-2 (#2576): exercise the release build → package → appcast chain on a
# SYNTHETIC version WITHOUT publishing, so release-chain breakage (build /
# packaging / appcast-generation regressions) is caught BEFORE a real tag is
# cut — instead of manually, post-tag, after a failed release.
#
# This is intentionally additive: it does NOT touch the real release path
# (release-cli.yml / sign-and-release.yml), creates NO GitHub release, does NO
# code-signing or Apple notarization (those need production credentials), and
# publishes NOTHING. Artifacts are uploaded only as throwaway workflow
# artifacts. Runs weekly and on demand.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 1'  # Mondays 12:00 UTC

permissions:
  contents: read

concurrency:
  group: release-dry-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dry-run:
    name: Release dry-run (${{ matrix.platform }}, no publish)
    if: github.event_name != 'schedule' || github.repository == vars.PULP_PRIMARY_REPO
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: darwin-arm64
          # Native Intel dry-run: builds + packages + RUNS the x86_64 CLI on
          # macos-15-intel (no cross-compile, no Rosetta), the empirical proof
          # for release-cli.yml's darwin-x64 leg. Advisory (experimental) so a
          # flaky macos-15-intel run doesn't fail the weekly dry-run.
          - os: macos-15-intel
            platform: darwin-x64
            experimental: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental || false }}
    timeout-minutes: ${{ matrix.experimental && 75 || 360 }}
    steps:
      - uses: actions/checkout@v5

      - name: Bootstrap dependencies
        run: ./setup.sh --ci --deps-only
        shell: bash

      - name: Fetch Skia binaries
        run: python3 tools/scripts/fetch_skia_for_release.py ${{ matrix.platform }}
        shell: bash

      - name: Configure (mirrors release-cli.yml)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPULP_BUILD_TESTS=OFF \
            -DPULP_ENABLE_AUDIO_PROBES=OFF \
            -DPULP_REQUIRE_GPU_FOR_SDK=ON \
            -DPULP_BUILD_WEBVIEW=ON
        shell: bash

      - name: Build CLI
        # Build everything with no --target, exactly as release-cli.yml does.
        # The Rust CLI's CMake target is `pulp-rust-cli` (it only *outputs* a
        # binary named `pulp`), so `--target pulp` fails with "No rule to make
        # target 'pulp'" — a latent bug in this dry-run since the Phase-8
        # rename. Building all also produces pulp-cpp + pulp-mcp for packaging.
        run: cmake --build build --config Release
        shell: bash

      - name: Package CLI (dry-run — no upload)
        run: |
          python3 tools/scripts/package_cli.py \
            --binary build/pulp \
            --cpp-binary build/tools/cli/pulp-cpp \
            --mcp-binary build/tools/mcp/pulp-mcp \
            --build-dir build \
            --platform ${{ matrix.platform }} \
            --out pulp-${{ matrix.platform }}.tar.gz
          test -s pulp-${{ matrix.platform }}.tar.gz || { echo "::error::package_cli produced no tarball"; exit 1; }
        shell: bash

      - name: Verify arch + run the packaged CLI natively
        run: |
          set -euo pipefail
          case "${{ matrix.platform }}" in
            darwin-arm64) EXPECT_ARCH="arm64" ;;
            darwin-x64)   EXPECT_ARCH="x86_64" ;;
          esac
          # Extract the packaged tarball and assert the shipped binary is the
          # exact (thin) arch this platform claims, then RUN it — on the native
          # runner this proves the artifact actually executes on real silicon.
          rm -rf dryrun-extract && mkdir -p dryrun-extract
          tar -xzf pulp-${{ matrix.platform }}.tar.gz -C dryrun-extract
          BIN="$(find dryrun-extract -name pulp -type f | head -1)"
          test -x "$BIN" || { echo "::error::packaged pulp binary missing"; exit 1; }
          ARCHS="$(lipo -archs "$BIN" 2>/dev/null || true)"
          if [ "$ARCHS" != "$EXPECT_ARCH" ]; then
            echo "::error::packaged pulp arch is '$ARCHS', expected exactly '$EXPECT_ARCH' — $(file "$BIN")"
            exit 1
          fi
          echo "OK: packaged pulp is thin $EXPECT_ARCH — running it:"
          "$BIN" help >/dev/null
          echo "OK: '$BIN help' ran on native ${{ matrix.platform }}."
        shell: bash

      - name: Generate + validate appcast (synthetic version, no publish)
        run: |
          ./build/pulp ship appcast \
            --version 0.0.0-dryrun \
            --url https://example.invalid/pulp-0.0.0-dryrun.pkg \
            --output appcast.xml
          test -s appcast.xml || { echo "::error::appcast generation produced no file"; exit 1; }
          xmllint --noout appcast.xml
        shell: bash

      - name: Upload dry-run artifacts (throwaway — NOT a release)
        uses: actions/upload-artifact@v6
        with:
          name: release-dry-run-${{ matrix.platform }}
          path: |
            pulp-${{ matrix.platform }}.tar.gz
            appcast.xml
          retention-days: 7
