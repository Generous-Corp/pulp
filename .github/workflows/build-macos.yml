name: Build and Test (macOS retarget)

# Dedicated workflow for re-running JUST the macOS leg of CI on a different
# runner pool, without disturbing the Linux/Windows legs that are part of
# `build.yml`'s matrix. Triggered manually (`workflow_dispatch`) or via the
# `pulp macos retarget` CLI wrapper.
#
# When this workflow's `macos` job completes successfully, its check supersedes
# the `macos` check from `build.yml`'s matrix leg (branch protection picks the
# most recent check by name). That's the per-PR override semantic.
#
# Sibling to (not replacement for) `build.yml`. Both workflows produce a job
# named `macos` so branch protection's required-check stays a stable name.
#
# Design source: pulp task #20 / `pulp macos retarget` follow-up.

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Where to run the macOS build/test"
        required: true
        default: local
        type: choice
        options:
          - local
          - namespace
          - github-hosted
      target_ref:
        description: "Branch / ref to run against (default: workflow ref)"
        required: false
        default: ""
        type: string

concurrency:
  # Independent of build.yml's `build-${{ github.ref }}` group so a manual
  # retarget doesn't cancel the matrix workflow_run, and vice versa.
  group: build-macos-${{ inputs.target_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: [self-hosted, macOS, ARM64, pulp-build-vm]
    name: macOS retarget build (pulp-build-vm)
    env:
      # Use a distinct build dir from build.yml's matrix so caches don't
      # collide if both run concurrently on the same self-hosted host.
      PULP_BUILD_DIR: build-macos-retarget
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
          ref: ${{ inputs.target_ref || github.ref }}
          clean: false

      - name: Install ccache
        run: |
          brew install ccache || {
            brew update
            brew install ccache
          }

      - name: Restore FetchContent sources (GitHub-hosted)
        if: runner.environment == 'github-hosted'
        id: fetchcontent-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/Library/Caches/Pulp/fetchcontent-src
          key: macOS-macos-retarget-fetchcontent-${{ hashFiles('setup.sh') }}
          restore-keys: macOS-macos-retarget-fetchcontent-

      - name: Restore ccache (GitHub-hosted)
        if: runner.environment == 'github-hosted'
        id: ccache-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/Library/Caches/ccache
          key: macOS-macos-retarget-ccache-${{ hashFiles('**/CMakeLists.txt', 'tools/cmake/*.cmake') }}-${{ github.ref }}
          restore-keys: |
            macOS-macos-retarget-ccache-${{ hashFiles('**/CMakeLists.txt', 'tools/cmake/*.cmake') }}-
            macOS-macos-retarget-ccache-

      - name: Bootstrap repository dependencies
        run: ./setup.sh --ci --deps-only

      - name: Configure
        run: |
          set -euo pipefail
          command -v ninja >/dev/null 2>&1 || brew install ninja
          cmake -S . -B "$PULP_BUILD_DIR" -G Ninja -DCMAKE_BUILD_TYPE=Release -DPULP_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build "$PULP_BUILD_DIR" --config Release --parallel 8

      - name: Ccache stats
        if: always()
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats
          else
            echo "ccache not available; skipping stats"
          fi

      - name: Test
        # Mirror build.yml's macOS test invocation. The `-LE validation`
        # exclude keeps auval/pluginval out (they require codesign on the
        # local runner) — same as the matrix leg.
        run: ctest --test-dir "$PULP_BUILD_DIR" --output-on-failure -C Release -LE validation -j8 --timeout 120 --exclude-regex "STFT|VisualizationBridge|Clipboard|Toolbar add items"
