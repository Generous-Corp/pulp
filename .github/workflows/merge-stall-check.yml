name: Merge-stall check

# Off-fleet "green PRs, but nothing is merging" watchdog.
#
# Runs on ubuntu-latest ON PURPOSE — the same reasoning as
# runner-health-check.yml: a guard that lives on the fleet dies with the fleet.
# The wedge this catches lives in whatever presses the merge button (Shipyard's
# per-host queue-tick held in reap-only mode), so GitHub-hosted is the only
# vantage point that survives it.
#
# The gap it closes
# -----------------
# runner-health-check.yml alarms on a DEAD RUNNER LANE: jobs sitting queued
# because runners died. The incident this guard exists for had the opposite
# shape — every required check GREEN, nothing queued, and still nothing merged
# for hours because the auto-merger was silently held. No job-level signal sees
# "everything is green and nobody is merging"; the only observable is a
# population of merge-ready PRs that stays merge-ready and unmerged.
#
# The alarm predicate (per open PR), all required:
#   1. Every REQUIRED check green (required set read from branch protection at
#      runtime, not hardcoded — falls back to the documented set if the token
#      cannot read protection rules).
#   2. mergeStateStatus in {CLEAN, BEHIND} (DIRTY / BLOCKED / UNSTABLE excluded).
#   3. Auto-merge enabled (a machine, not a human, owns the merge).
#   4. Merge-ready longer than the threshold (default 45 min), measured from the
#      last required check's completion time.
#   ...AND sustained across TWO consecutive sweeps, so a normal in-flight PR
#   that merges within a tick never trips. The cross-tick memory is the set of
#   stuck PR numbers, persisted as a workflow artifact (crash-safe: GitHub holds
#   it independently of this repo or any host).
#
# mergeStateStatus is a GraphQL field; one paginated GraphQL call returns every
# open PR's state. A per-PR REST loop gets rate-limited and returns false
# readings under load — which is exactly how the motivating incident's state
# looked wrong — so collection is GraphQL, in tools/scripts/merge_stall_watchdog.py.
#
# Issue lifecycle mirrors auto-release-watchdog.yml / runner-health-check.yml:
# one tracking issue, edited in place each sweep, closed automatically on
# recovery. REST search rather than GraphQL for the issue lookup — the shared
# GraphQL quota is regularly exhausted by agent PR polling, and a watchdog must
# not fail when the thing it watches is fine.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      threshold_minutes:
        description: 'Merge-ready age (min) that, sustained two sweeps, opens an issue'
        required: false
        default: '45'
      dry_run:
        description: 'Log findings but do not touch the tracking issue'
        required: false
        default: 'false'

permissions:
  contents: read
  issues: write
  actions: read
  pull-requests: read

concurrency:
  group: merge-stall-check
  cancel-in-progress: false

jobs:
  check:
    if: github.event_name != 'schedule' || github.repository == 'danielraffel/pulp'
    runs-on: ubuntu-latest
    name: Check for merge-ready PRs that are not merging

    env:
      THRESHOLD_MINUTES: ${{ github.event.inputs.threshold_minutes || '45' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      TRACKING_TITLE: 'Merge stall: green PRs are not merging'
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Restore previous-sweep state
        id: restore
        shell: bash
        run: |
          set -euo pipefail

          repo='${{ github.repository }}'
          mkdir -p prev
          echo '{"stuck_prs": []}' > prev/state.json

          # Pull the stuck-PR set from the most recent completed run of THIS
          # workflow. The two-consecutive-sweeps rule needs last sweep's set;
          # the artifact is the crash-safe carrier (GitHub holds it whether or
          # not any tracking issue exists yet). A first-ever run, or a run whose
          # predecessor uploaded nothing, simply starts from the empty set — the
          # worst case is one extra sweep before an alarm can promote.
          runs_json=$(
              gh api "/repos/${repo}/actions/workflows/merge-stall-check.yml/runs?status=completed&per_page=10" \
                  2>/dev/null || echo '{"workflow_runs": []}'
          )
          ids=$(echo "$runs_json" | python3 -c "import json,sys; [print(r['id']) for r in json.load(sys.stdin).get('workflow_runs', [])]")
          for id in $ids; do
              if [ "$id" = "${{ github.run_id }}" ]; then
                  continue
              fi
              if gh run download "$id" -n merge-stall-state -D prev 2>/dev/null; then
                  echo "Restored stuck-PR state from run ${id}."
                  break
              fi
          done
          echo "prev_state=$(cat prev/state.json)"

      - name: Scan open PRs
        id: scan
        shell: bash
        run: |
          set -euo pipefail

          python3 tools/scripts/merge_stall_watchdog.py \
              --repo '${{ github.repository }}' \
              --base main \
              --threshold-minutes "${THRESHOLD_MINUTES}" \
              --prev-state prev/state.json \
              --findings-out findings.json \
              --snapshot-out snapshot.json \
              --state-out state.json \
              --body-out body.md \
              --summary-out "${GITHUB_STEP_SUMMARY}" \
              | tee scan.log

          count=$(python3 -c "import json; print(sum(1 for f in json.load(open('findings.json')) if f['level'] == 'alarm'))")
          echo "count=${count}" >> "$GITHUB_OUTPUT"
          echo "Alarm count: ${count}"

      - name: Persist this-sweep state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-stall-state
          path: state.json
          retention-days: 7
          if-no-files-found: warn

      - name: Maintain tracking issue
        if: env.DRY_RUN != 'true'
        shell: bash
        env:
          COUNT: ${{ steps.scan.outputs.count }}
        run: |
          set -euo pipefail

          repo='${{ github.repository }}'
          title="${TRACKING_TITLE}"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Look up in both OPEN and CLOSED state so a recovered sweep only
          # closes an OPEN tracker and a recurrence reopens the same issue
          # rather than spawning a new one every 30 minutes.
          search_json=$(
              gh api --method GET "/search/issues" \
                  -f q="repo:${repo} is:issue in:title ${title}"
          )
          existing_json=$(printf '%s' "$search_json" | TRACKING_TITLE="$title" python3 -c 'import json, os, sys; title = os.environ["TRACKING_TITLE"]; data = json.load(sys.stdin); match = next((item for item in data.get("items", []) if item.get("title") == title), None); print(json.dumps({"number": match.get("number", ""), "state": str(match.get("state", "")).upper()}) if match else "{}")')
          existing=$(echo "$existing_json" | python3 -c "import json, sys; d=json.load(sys.stdin); print(d.get('number','') or '')")
          existing_state=$(echo "$existing_json" | python3 -c "import json, sys; d=json.load(sys.stdin); print(d.get('state','') or '')")

          if [ "$COUNT" -eq 0 ]; then
              if [ -n "${existing:-}" ] && [ "$existing_state" = "OPEN" ]; then
                  echo "Merges are flowing again — closing tracker #${existing}."
                  gh api -X POST "/repos/${repo}/issues/${existing}/comments" \
                      -f body="Sweep on $(date -u '+%Y-%m-%d %H:%M UTC') found no PR stuck merge-ready: merges are flowing (or nothing is ready). Closing. (${run_url})"
                  gh api -X PATCH "/repos/${repo}/issues/${existing}" \
                      -f state=closed \
                      -f state_reason=completed
              else
                  echo "No stuck PRs and no open tracker — nothing to do."
              fi
              exit 0
          fi

          {
            cat body.md
            echo
            echo "**Sweep:** ${run_url}"
          } > issue-body.md

          if [ -z "${existing:-}" ]; then
              echo "Creating tracking issue."
              TRACKING_TITLE="$title" python3 -c 'import json, os; body = open("issue-body.md", encoding="utf-8").read(); print(json.dumps({"title": os.environ["TRACKING_TITLE"], "body": body, "labels": ["bug", "ci", "blocks-release"]}))' > issue.json
              gh api -X POST "/repos/${repo}/issues" --input issue.json 2>&1 || {
                  # Labels may not exist on a fresh repo; the tracker matters
                  # more than its tags, so retry without them.
                  TRACKING_TITLE="$title" python3 -c 'import json, os; body = open("issue-body.md", encoding="utf-8").read(); print(json.dumps({"title": os.environ["TRACKING_TITLE"], "body": body}))' > issue.json
                  gh api -X POST "/repos/${repo}/issues" --input issue.json
              }
          else
              echo "Updating tracking issue #${existing} in place."
              gh api -X PATCH "/repos/${repo}/issues/${existing}" -F body=@issue-body.md
              gh api -X PATCH "/repos/${repo}/issues/${existing}" -f state=open 2>/dev/null || true
          fi

      - name: Upload snapshot + findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-stall-findings
          path: |
            findings.json
            snapshot.json
          retention-days: 14
          if-no-files-found: ignore
