# Web plugins CI — builds Pulp's WAMv2 (Emscripten) and WebCLAP (wasi-sdk) web
# plugin formats and runs every web validation, including the browser fixtures in
# headless Chrome. This turns the previously by-hand browser proofs into a CI
# lane (RD11). Advisory: a Linux runner with emsdk + wasi-sdk + Chrome — no VM
# and no self-hosted runner needed for a headless-browser web lane.
name: Web Plugins

on:
  pull_request:
    paths:
      - "core/format/src/wasm/**"
      - "core/format/include/pulp/format/web/**"
      - "core/timebase/**"
      - "core/timeline/**"
      - "core/playback/**"
      - "core/audio/include/pulp/audio/wav_decoder.hpp"
      - "core/audio/src/wav_decoder.cpp"
      - "examples/web-demos/**"
      - "examples/pulp-gain/**"
      - "examples/super-convolver/**"
      - "packages/pulp-web-player/**"
      - "core/gpu_audio/**"
      - "tools/cmake/PulpWam.cmake"
      - "tools/cmake/PulpWclap.cmake"
      - "tools/cmake/PulpPortableWav.cmake"
      - "tools/scripts/*web_timeline_source_closure_check.py"
      - "tools/cmake/PulpWebUi.cmake"
      - "tools/cmake/PulpGpuWasm.cmake"
      - "tools/cmake/wasi-toolchain.cmake"
      - ".github/workflows/web-plugins.yml"
  # Run the required `WAMv2 + WebCLAP (Linux, headless Chrome)` check on queued
  # merge groups so a merge queue on `main` can land PRs. `merge_group` does not
  # honour the `paths` filter above, so this fires on every group.
  merge_group:
  workflow_dispatch:

concurrency:
  group: web-plugins-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-plugins:
    name: WAMv2 + WebCLAP (Linux, headless Chrome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # PINNED, deliberately. emsdk is a floating toolchain: `latest` has already
      # shipped two breaking WebGPU API changes and a change to how SINGLE_FILE
      # embeds the wasm, either of which lands here as a mystery failure on a PR
      # that touched nothing. 6.0.2 is the version the WAM/WebCLAP lanes are
      # verified against; 4.0.10 is the floor for the emdawnwebgpu port, so any
      # future bump stays at or above it.
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.2

      - name: Set up wasi-sdk
        run: |
          set -euo pipefail
          ver=25
          url="https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${ver}/wasi-sdk-${ver}.0-x86_64-linux.tar.gz"
          curl -fsSL "$url" -o /tmp/wasi-sdk.tar.gz
          mkdir -p "$HOME/wasi-sdk"
          tar -xzf /tmp/wasi-sdk.tar.gz -C "$HOME/wasi-sdk" --strip-components=1
          echo "WASI_SDK_PREFIX=$HOME/wasi-sdk" >> "$GITHUB_ENV"

      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # ── Is there a software WebGPU adapter on a GPU-less Linux runner? Nobody
      #    knew, so this step FINDS OUT and PRINTS it. Deliberately NON-GATING
      #    (`continue-on-error`): its only job is to record, run after run, what
      #    requestAdapter() actually returns here. If it ever starts returning an
      #    adapter, the GPU-audio fixture below can be promoted from its named skip
      #    to a real gate on this lane too.
      - name: Probe WebGPU on this runner (diagnostic, never gates)
        continue-on-error: true
        run: |
          set -euo pipefail
          sudo apt-get update -qq && sudo apt-get install -y -qq python3 >/dev/null
          mkdir -p /tmp/gpu-probe && cd /tmp/gpu-probe
          cat > index.html <<'HTML'
          <!doctype html><body id=o>pending</body><script>
          (async () => {
            const o = document.getElementById("o");
            if (!navigator.gpu) { o.textContent = "RESULT: no-navigator-gpu"; return; }
            const a = await navigator.gpu.requestAdapter();
            if (!a) { o.textContent = "RESULT: no-adapter"; return; }
            const i = a.info || {};
            o.textContent = "RESULT: adapter " + i.vendor + "/" + i.architecture +
                            " features=" + [...a.features].join("|");
          })();
          </script>
          HTML
          python3 -m http.server 8811 >/dev/null 2>&1 &
          sleep 1
          # WebGPU needs a secure context, so the page is served over
          # http://localhost — a data: or file:// URL has no navigator.gpu at all
          # (measured; it is the first thing that makes a probe like this lie).
          probe() {
            echo "--- chrome flags: ${*:-none}"
            "${{ steps.chrome.outputs.chrome-path }}" --headless --no-sandbox \
              --virtual-time-budget=8000 "$@" --dump-dom http://localhost:8811/ 2>/dev/null \
              | grep -o "RESULT:[^<]*" || echo "RESULT: (page produced nothing)"
          }
          probe
          probe --enable-unsafe-swiftshader
          probe --enable-unsafe-swiftshader --use-angle=swiftshader

      - name: Vendor choc for the WAM build
        run: |
          set -euo pipefail
          git clone --depth 1 --branch pulp-webview-dnd-poc1 \
            https://github.com/danielraffel/choc.git "$HOME/choc-src"
          echo "PULP_WAM_CHOC_INCLUDE=$HOME/choc-src" >> "$GITHUB_ENV"

      - name: Install playwright-core
        run: npm install --no-save playwright-core

      # ── Skia wasm slice (Ganesh/WebGL2) — the Pulp UI module's one binary
      #    dependency. URL + sha256 come from tools/deps/manifest.json, so the
      #    lane and the dependency audit can never disagree about which slice is
      #    in use; the cache is keyed on that manifest.
      - name: Cache the Skia wasm slice
        id: skia-cache
        uses: actions/cache@v4
        with:
          path: ~/skia-wasm
          key: skia-wasm-${{ hashFiles('tools/deps/manifest.json') }}

      - name: Fetch the Skia wasm slice
        if: steps.skia-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          read -r url sha < <(python3 - <<'PY'
          import json
          dep = next(d for d in json.load(open("tools/deps/manifest.json"))["dependencies"]
                     if d["name"] == "Skia")
          # Key matches the release asset's platform segment
          # (skia-build-<platform>-gpu-release.zip), the convention every other
          # slice follows and the one check_manifest_mirrors.py enforces against
          # external/skia-build/VERSION.md.
          a = dep["determinism"]["release_assets"]["wasm-wasm32"]
          print(a["url"], a["sha256"])
          PY
          )
          curl -fsSL "$url" -o /tmp/skia-wasm.zip
          echo "$sha  /tmp/skia-wasm.zip" | sha256sum -c -
          mkdir -p "$HOME/skia-wasm"
          unzip -q /tmp/skia-wasm.zip -d "$HOME/skia-wasm"

      - name: Locate + verify the Skia wasm slice
        run: |
          set -euo pipefail
          lib="$(find "$HOME/skia-wasm" -path '*build/wasm-gpu/lib/Release/libskia.a' | head -1)"
          [ -n "$lib" ] || { echo "no wasm-gpu libskia.a in the fetched slice"; exit 1; }
          root="${lib%/build/wasm-gpu/lib/Release/libskia.a}"
          echo "SKIA_DIR=$root" >> "$GITHUB_ENV"
          # Asserts the slice really is Ganesh/WebGL2 (no Dawn, no Graphite) —
          # the invariant FindSkia.cmake's Emscripten arm is built on.
          #
          # The verifier needs llvm-nm to read the archive's symbols and returns 77
          # (CTest's SKIP code) when it cannot find it. Under `set -e` that skip is
          # indistinguishable from a failure and kills the job — and silently
          # skipping the check would be worse, since this is the invariant the whole
          # Emscripten render arm rests on. emsdk ships llvm-nm, so put it on PATH
          # and let the check actually run.
          nm_dir="$(dirname "$(find "$EMSDK" -name llvm-nm -type f 2>/dev/null | head -1)")"
          [ -n "$nm_dir" ] && [ "$nm_dir" != "." ] || { echo "llvm-nm not found in emsdk — cannot verify the slice"; exit 1; }
          PATH="$nm_dir:$PATH" python3 tools/scripts/verify_wasm_skia_slice.py "$root"

      # ── WAMv2 (Emscripten) ────────────────────────────────────────────────
      - name: Build WAMv2 plugins
        working-directory: examples/web-demos/wasm-build
        run: |
          set -euo pipefail
          emcmake cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DPULP_WAM_CHOC_INCLUDE="$PULP_WAM_CHOC_INCLUDE"
          cmake --build build -j"$(nproc)"

      - name: WAMv2 Node validations
        working-directory: examples/web-demos/wasm-build
        run: |
          set -euo pipefail
          # Effect + instrument feature coverage (the runner takes a built .wasm).
          # Covers param + plugin_state_io round-trip AND hostile-state rejection
          # (32-bit overflow blob, corrupted CRC, truncation) — no worklet trap.
          node wam_feature_runner.mjs build/PulpGain.wasm effect
          node wam_feature_runner.mjs build/PulpPluck.wasm instrument
          # In-worklet RACK path (pulp-pluck → pulp-gain): compiles
          # wam_chain_entry.cpp + WamChainBridge and exercises stage-qualified
          # params, MIDI→audio flow, and the "PWR1" multi-stage state container.
          node wam_rack_runner.mjs build/PulpPluckGainRack.wasm
          # Web-build report (UI strategy + parameter binding targets, both modes).
          node ../../../core/format/src/wasm/wam_build_report.test.mjs --wasm build/PulpGain.wasm
          # SuperConvolver: the headless convolution reverb (GPU engine + file IR
          # loader + native editor compiled out). Asserts wet sound from the
          # built-in IR with zero file I/O, Size/Mix audibly changing the output,
          # the fixed 512-sample PDC latency, and the state round-trip. The SAME
          # runner drives the WebCLAP module below, so the two ABIs are held to
          # one set of assertions.
          node superconvolver_runner.mjs build/SuperConvolver.wasm

      - name: WAMv2 browser fixture (headless Chrome)
        working-directory: examples/web-demos/wasm-build
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          set -euo pipefail
          cp build/PulpGainWorklet.js                       browser-test/wam-dsp.js
          cp ../../../core/format/src/wasm/wam-processor.js  browser-test/
          cp ../../../core/format/src/wasm/wam-runtime.mjs   browser-test/
          cp ../../../core/format/src/wasm/wam-plugin.js     browser-test/
          ln -sfn "$GITHUB_WORKSPACE/node_modules" browser-test/node_modules
          node browser-test/validate.mjs --screenshot /tmp/wam-browser.png

      # ── WebCLAP (wasi-sdk) ────────────────────────────────────────────────
      - name: Build WebCLAP module + bundle
        working-directory: examples/web-demos/wclap-build
        run: |
          set -euo pipefail
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/tools/cmake/wasi-toolchain.cmake" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j"$(nproc)"

      - name: WebCLAP Node validations
        run: |
          set -euo pipefail
          node core/format/src/wasm/wclap_probe.mjs        examples/web-demos/wclap-build/build/PulpGain.wasm
          node core/format/src/wasm/wclap_host_runner.mjs  examples/web-demos/wclap-build/build/PulpGain.wasm --gain-db 6
          # SuperConvolver through the OTHER ABI, driven by the same runner as the
          # WAM module: same audio/parameter/latency assertions, so a divergence
          # between the two ABIs fails here instead of in a demo page.
          node core/format/src/wasm/wclap_probe.mjs        examples/web-demos/wclap-build/build/SuperConvolver.wasm
          node examples/web-demos/wasm-build/superconvolver_runner.mjs \
            examples/web-demos/wclap-build/build/SuperConvolver.wasm
          node core/format/src/wasm/pack-wclap.test.mjs
          # Host-provided CLAP extensions (log/thread-check/latency/tail/state/
          # params) driven through the real host-vtable trampolines — no wasm.
          node core/format/src/wasm/wclap-host-extensions.test.mjs
          # Pure-JS host helpers: no wasm, no browser, so they run anywhere.
          node core/format/src/wasm/wam-scope.test.mjs
          # MIDI-out wire records, per-URL processor naming, and version-skew
          # bridge degradation (stale DSP missing newer exports must not throw).
          node core/format/src/wasm/wam-runtime.test.mjs

      - name: WebCLAP browser host (headless Chrome)
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          set -euo pipefail
          ln -sfn "$GITHUB_WORKSPACE/node_modules" examples/web-demos/wclap-build/browser-host/node_modules
          node examples/web-demos/wclap-build/browser-host/validate.mjs --screenshot /tmp/wclap-browser.png

      # ── Pulp UI in the browser (Skia Ganesh on WebGL2) ────────────────────
      # DSP-free: the same module mounts against the WAM demo and the WebCLAP
      # demo through the web-player HostAdapter seam, so it is built and proven
      # once. The fixture asserts on real pixels and a real pointer gesture —
      # nothing a native unit test can reach.
      - name: Build the Pulp UI wasm module
        run: |
          set -euo pipefail
          emcmake cmake -S examples/web-demos/super-convolver-ui -B build-webui \
            -DCMAKE_BUILD_TYPE=Release \
            -DSKIA_DIR="$SKIA_DIR" \
            -DPULP_WEBUI_CHOC_INCLUDE="$PULP_WAM_CHOC_INCLUDE"
          cmake --build build-webui -j"$(nproc)"

      - name: Pulp UI browser fixture (headless Chrome)
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          set -euo pipefail
          ln -sfn "$GITHUB_WORKSPACE/node_modules" examples/web-demos/super-convolver-ui/browser-test/node_modules
          node examples/web-demos/super-convolver-ui/browser-test/validate.mjs \
            --build "$GITHUB_WORKSPACE/build-webui" \
            --artifact /tmp/pulp-ui-browser.png

      # ── The GPU-audio SAB ring ────────────────────────────────────────────
      # The ring's core is DUPLICATED: the module source
      # (examples/web-demos/gpu-audio/js/gpu-ring.mjs) and a verbatim inline copy in
      # the worklet bundle, because an AudioWorklet module is a classic script and
      # cannot import. That duplication is only tolerable because a test asserts the
      # two are byte-identical — so the test has to actually RUN, on the audio-thread
      # code of a PUBLISHED npm package. `npm test` also covers the adapter seams.
      - name: web-player unit tests (incl. gpu-ring byte-identity + inertness)
        run: npm --prefix packages/pulp-web-player test

      - name: gpu-ring semantics (drops, expiries, stale wets, Engine flip)
        run: node examples/web-demos/gpu-audio/js/gpu-ring.test.mjs

      # ── The GPU-audio demo surface ────────────────────────────────────────
      # No browser, no wasm: runs the assembler against a stub build tree and
      # asserts what the /super-convolver-gpu/ page IS today, AND that the two
      # SHIPPED SuperConvolver pages did not move (sha256-pinned, modulo the
      # cache-bust hash).
      - name: SuperConvolver GPU gallery smoke
        run: node examples/web-demos/gpu-audio/browser-test/gallery-smoke.mjs

      # The proof fixture on a GPU-less Linux runner. It SKIPS with a named reason
      # (`SKIP: webgpu-unavailable (no-adapter)`, exit 0) rather than pretending;
      # PULP_REQUIRE_WEBGPU is deliberately NOT set here. The real gate is the
      # macOS job below, where a WebGPU adapter is MEASURED to exist. If the probe
      # step above ever reports an adapter on this runner, set PULP_REQUIRE_WEBGPU=1
      # here too and this becomes a second real gate.
      - name: Build the WebGPU DSP module (Emscripten + emdawnwebgpu)
        run: |
          set -euo pipefail
          emcmake cmake -S examples/web-demos/gpu-audio -B build-gpu-dsp \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-gpu-dsp -j"$(nproc)"

      - name: GPU-audio browser proof (skips with a reason where there is no adapter)
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          set -euo pipefail
          ln -sfn "$GITHUB_WORKSPACE/node_modules" examples/web-demos/gpu-audio/browser-test/node_modules
          node examples/web-demos/gpu-audio/browser-test/validate-gpu.mjs \
            --gpu-wasm examples/web-demos/wclap-build/build/SuperConvolverGpu.wasm \
            --gpu-build "$GITHUB_WORKSPACE/build-gpu-dsp" \
            --screenshot /tmp/gpu-audio-browser.png

      - name: Upload browser screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-plugins-screenshots
          path: /tmp/*-browser.png
          if-no-files-found: ignore

  # ── THE REAL GPU GATE ───────────────────────────────────────────────────────
  # Runs ONLY where a WebGPU adapter is measured to exist: the self-hosted macOS
  # runners (PULP_LOCAL_MACOS_RUNS_ON_JSON). Probed 2026-07-12 on the Mac Studio
  # host — headless Chrome there reports `apple / metal-3` with `timestamp-query`
  # among its adapter features, so PULP_REQUIRE_WEBGPU=1 makes a null adapter a
  # HARD FAILURE and the fixture cannot silently degrade into
  # always-skipped-always-green.
  #
  # The job is skipped entirely when that repo variable is unset, so a fork
  # without the runner pool does not see a permanently red check. It is advisory
  # (not in branch protection) until it has run green for a while — but it is a
  # REAL gate on the machines it runs on, not a decoration.
  gpu-audio-macos:
    name: GPU audio proof (macOS, real WebGPU)
    if: vars.PULP_LOCAL_MACOS_RUNS_ON_JSON != ''
    runs-on: ${{ fromJSON(vars.PULP_LOCAL_MACOS_RUNS_ON_JSON) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.2

      - name: Set up wasi-sdk
        run: |
          set -euo pipefail
          ver=25
          url="https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${ver}/wasi-sdk-${ver}.0-arm64-macos.tar.gz"
          curl -fsSL "$url" -o /tmp/wasi-sdk.tar.gz
          mkdir -p "$HOME/wasi-sdk-macos"
          tar -xzf /tmp/wasi-sdk.tar.gz -C "$HOME/wasi-sdk-macos" --strip-components=1
          echo "WASI_SDK_PREFIX=$HOME/wasi-sdk-macos" >> "$GITHUB_ENV"

      - name: Install playwright-core
        run: npm install --no-save playwright-core

      # The GPU-capable WebCLAP module (Engine + "GPU only" params) and the
      # Skia-free WebGPU DSP module the worker instantiates. No Skia anywhere in
      # this job: the proof is about audio, not pixels.
      - name: Build SuperConvolverGpu (WebCLAP) + the WebGPU DSP module
        run: |
          set -euo pipefail
          cmake -S examples/web-demos/wclap-build -B build-wclap \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/tools/cmake/wasi-toolchain.cmake" \
            -DCMAKE_BUILD_TYPE=Release
          # pulp_add_wclap(Foo) declares the target as `Foo-wclap`, not `Foo` — the
          # bare names are a hard "No rule to make target", not a fallback.
          # gpu-audio-macos runs on the shared self-hosted Studios (see runs-on),
          # so build with a governed lease share, not every core.
          tools/ci/governed-build.sh cmake --build build-wclap --target SuperConvolverGpu-wclap SuperConvolver-wclap
          emcmake cmake -S examples/web-demos/gpu-audio -B build-gpu-dsp \
            -DCMAKE_BUILD_TYPE=Release
          tools/ci/governed-build.sh cmake --build build-gpu-dsp

      - name: GPU-audio browser proof (WebGPU REQUIRED)
        env:
          PULP_REQUIRE_WEBGPU: "1"
          CHROME_PATH: /Applications/Google Chrome.app/Contents/MacOS/Google Chrome
        run: |
          set -euo pipefail
          ln -sfn "$GITHUB_WORKSPACE/node_modules" examples/web-demos/gpu-audio/browser-test/node_modules
          node examples/web-demos/gpu-audio/browser-test/validate-gpu.mjs \
            --gpu-wasm build-wclap/SuperConvolverGpu.wasm \
            --gpu-build "$GITHUB_WORKSPACE/build-gpu-dsp" \
            --screenshot /tmp/gpu-audio-macos.png

      # ── Does the SHIPPED PAGE run the GPU? ─────────────────────────────────────
      #
      # The proof above proves the ENGINE, and cannot prove the page: it sidesteps the IR
      # handoff by measuring the impulse response on the CPU engine in one run and handing
      # it to the worker in the next. A visitor gets no such favour. Everything between the
      # plugin's IR and the worker's kernel — the wasm exports, the worklet poll, the
      # adapter latch, lane.setIr(), the worker's re-prepare — is uncovered by it, and each
      # link fails SILENTLY: the page loads, the CPU convolver plays, and the GPU engine
      # simply never appears. So the assembled page gets driven in a real browser.
      #
      # It has to run HERE and not in the Cloudflare deploy lane, which is where the site
      # is normally assembled: that lane is Linux, has no WebGPU adapter, and the fixture
      # would skip. A real GPU is the whole point.
      - name: Cache the Skia wasm slice
        id: skia-cache-macos
        uses: actions/cache@v4
        with:
          path: ~/skia-wasm
          key: skia-wasm-${{ hashFiles('tools/deps/manifest.json') }}

      # The gallery's other 23 plugins live in two separate public repos, and
      # assemble-gallery.mjs hard-fails on the first missing wasm — so the page cannot be
      # assembled without them, even though this job only cares about SuperConvolver.
      - uses: actions/checkout@v4
        with:
          repository: danielraffel/pulp-example-plugins
          path: _ext/pulp-example-plugins
      - uses: actions/checkout@v4
        with:
          repository: danielraffel/pulp-classic-effects
          path: _ext/pulp-classic-effects

      # The UI module reads its theme JSON through choc, and choc is FetchContent'd —
      # so a fresh checkout has no copy and PulpWebUi.cmake's fallback search (which
      # looks in build/_deps) finds nothing. The Linux lane vendors it; this lane did
      # not, and configured build-webui without the flag, so it failed at CMake time
      # long before it could prove anything about the GPU.
      - name: Vendor choc for the UI build
        run: |
          set -euo pipefail
          # Self-hosted runners keep $HOME between jobs — a bare clone would fail on the
          # second run.
          [ -d "$HOME/choc-src" ] || git clone --depth 1 --branch pulp-webview-dnd-poc1 \
            https://github.com/danielraffel/choc.git "$HOME/choc-src"
          echo "PULP_WAM_CHOC_INCLUDE=$HOME/choc-src" >> "$GITHUB_ENV"

      - name: Assemble the GPU demo page (the real one, from the real modules)
        run: |
          set -euo pipefail
          if [ ! -d "$HOME/skia-wasm" ]; then
            read -r url sha < <(python3 - <<'PY'
          import json
          dep = next(d for d in json.load(open("tools/deps/manifest.json"))["dependencies"]
                     if d["name"] == "Skia")
          a = dep["determinism"]["release_assets"]["wasm-wasm32"]
          print(a["url"], a["sha256"])
          PY
          )
            curl -fsSL "$url" -o /tmp/skia-wasm.zip
            echo "$sha  /tmp/skia-wasm.zip" | shasum -a 256 -c -
            mkdir -p "$HOME/skia-wasm"
            unzip -q /tmp/skia-wasm.zip -d "$HOME/skia-wasm"
          fi

          # The page's status strip is a Label in Pulp's own view tree, so the GPU page
          # cannot be assembled without the UI module — there is nothing to report into.
          emcmake cmake -S examples/web-demos/super-convolver-ui -B build-webui \
            -DCMAKE_BUILD_TYPE=Release -DSKIA_DIR="$HOME/skia-wasm" \
            -DPULP_WEBUI_CHOC_INCLUDE="$PULP_WAM_CHOC_INCLUDE"
          tools/ci/governed-build.sh cmake --build build-webui

          # Every gallery plugin, so the assembler can run at all (see the checkouts above).
          cmake -S examples/web-demos/wclap-build -B build-wclap \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/tools/cmake/wasi-toolchain.cmake" \
            -DPULP_EXAMPLE_PLUGINS_DIR="$GITHUB_WORKSPACE/_ext/pulp-example-plugins" \
            -DPULP_CLASSIC_EFFECTS_DIR="$GITHUB_WORKSPACE/_ext/pulp-classic-effects" \
            -DCMAKE_BUILD_TYPE=Release
          tools/ci/governed-build.sh cmake --build build-wclap

          node examples/web-demos/wclap-build/cloudflare/assemble-gallery.mjs \
            --build "$GITHUB_WORKSPACE/build-wclap" \
            --ui-build "$GITHUB_WORKSPACE/build-webui" \
            --gpu-build "$GITHUB_WORKSPACE/build-gpu-dsp"

      - name: The shipped page runs its GPU engine (WebGPU REQUIRED)
        env:
          PULP_REQUIRE_WEBGPU: "1"
          CHROME_PATH: /Applications/Google Chrome.app/Contents/MacOS/Google Chrome
        run: |
          set -euo pipefail
          node examples/web-demos/gpu-audio/browser-test/page-gpu.mjs \
            --site examples/web-demos/wclap-build/cloudflare/public

      - name: Upload the proof screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-audio-macos
          path: /tmp/gpu-audio-macos.png
          if-no-files-found: ignore
