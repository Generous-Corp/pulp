name: Release-watchdog reaper

# Sweeps up the release trackers that the watchdogs left behind.
#
# The per-version-tracker pattern is retired: release-reconcile.yml now owns
# release health and keeps exactly ONE incident issue, updated in place, so no
# new trackers of this shape are minted. This reaper stays because the historical
# ones still need closing (they orphan forever — 334 had piled up by 2026-05-22,
# pulp #2576) and because release-cadence-check and auto-release-watchdog still
# file per-version trackers of their own.
#
# Two tracker shapes are reaped:
#
#   1. Version-keyed trackers ("Tag vX.Y.Z has no GitHub Release", …) — closed
#      when that release objectively exists or a strictly-greater version has
#      shipped.
#   2. SHA-keyed "release: stuck — fix/feat merged without bump (<sha>)"
#      trackers that auto-release.yml's stranded detector mints one-per-tip-SHA.
#      Their title carries no semantic version, so they used to orphan forever
#      (102 open by 2026-07; they bury real signal and burn agent scan tokens).
#      The reaper now parses the body for the full tip SHA + uncovered surfaces
#      and closes the tracker once a LATER release tag for every uncovered
#      surface contains the stranded commit — i.e. the missing bump has shipped
#      and consumers can reach the change. Logic lives in the pure, unit-tested
#      tools/scripts/reap_stranded_tracker.py (test_reap_stranded_tracker.py).
#
# Conservative by construction: it only touches issues whose titles match the
# exact auto-generated watchdog patterns. A version tracker closes only when the
# release exists or is superseded; a SHA-keyed tracker closes only when EVERY
# uncovered surface has a release tag that contains the stranded commit. Any
# unparseable field or any still-unshipped surface leaves the tracker open, so a
# genuinely active strand is never closed.
on:
  schedule:
    - cron: '0 6 * * *'  # daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: watchdog-reaper
  cancel-in-progress: false

jobs:
  reap:
    name: Close stale release-watchdog trackers
    if: github.event_name != 'schedule' || github.repository == 'danielraffel/pulp'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history + all tags for `git tag --contains`

      - name: Fetch tags explicitly
        run: git fetch --tags --force

      - name: Self-test SHA-keyed reap logic
        # Fail closed: if the pure close-decision helper regresses, do not sweep.
        run: python3 tools/scripts/test_reap_stranded_tracker.py

      - name: Reap superseded/released trackers
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          latest="$(gh release list --repo "$REPO" --limit 1 \
            --json tagName --jq '.[0].tagName // empty')"
          if [ -z "$latest" ]; then
            echo "No releases found; nothing to reap."
            exit 0
          fi
          echo "Latest release: $latest"

          # Open issues whose titles are auto-generated watchdog trackers.
          gh issue list --repo "$REPO" --state open --limit 1000 \
            --json number,title \
            --jq '.[] | select(.title | test("^Tag v[0-9.]+ has no GitHub Release$|^release-cli failed for v[0-9.]+|^release: stuck — fix/feat merged without bump|^Tag v[0-9.]+ stuck as draft")) | "\(.number)\t\(.title)"' \
            > trackers.txt || true

          total=$(wc -l < trackers.txt | tr -d ' ')
          echo "Open watchdog trackers: $total"
          closed=0

          while IFS=$'\t' read -r num title; do
            [ -z "${num:-}" ] && continue
            # SHA-keyed release-stuck trackers deliberately have no semantic
            # version in their title. `grep` returns 1 for that valid case;
            # neutralize it so `set -euo pipefail` does not abort the entire
            # daily sweep before the remaining version trackers are reaped.
            ver="$(printf '%s' "$title" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)"
            if [ -z "$ver" ]; then
              # SHA-keyed "release: stuck" tracker — the title has no semantic
              # version. Parse the body for the full tip SHA + uncovered
              # surfaces, then close only once a later release tag for EVERY
              # uncovered surface contains the stranded commit.
              body="$(gh issue view "$num" --repo "$REPO" --json body --jq .body 2>/dev/null || true)"
              parsed="$(printf '%s' "$body" | python3 tools/scripts/reap_stranded_tracker.py parse)"
              tip_sha="${parsed%%$'\t'*}"
              surfaces="${parsed#*$'\t'}"
              if [ -z "$tip_sha" ] || [ -z "$surfaces" ]; then
                echo "  #$num: could not parse tip SHA / surfaces from body — leaving open."
                continue
              fi
              if ! git cat-file -e "${tip_sha}^{commit}" 2>/dev/null; then
                echo "  #$num: tip ${tip_sha:0:8} not in fetched history — leaving open."
                continue
              fi
              decision="$(git tag --contains "$tip_sha" 2>/dev/null \
                | python3 tools/scripts/reap_stranded_tracker.py decide "$tip_sha" "$surfaces")"
              verdict="${decision%%$'\t'*}"
              dreason="${decision#*$'\t'}"
              if [ "$verdict" = "close" ]; then
                gh issue close "$num" --repo "$REPO" --reason completed \
                  -c "Auto-reaped by watchdog-reaper.yml: $dreason. (pulp #2576) Reopen if a specific version's binaries are genuinely needed." \
                  >/dev/null 2>&1 && closed=$((closed+1))
              else
                echo "  #$num: $dreason"
              fi
              continue
            fi

            reason=""
            if gh release view "$ver" --repo "$REPO" >/dev/null 2>&1; then
              reason="release $ver has published"
            else
              # superseded if a strictly-greater version has shipped
              top="$(printf '%s\n%s\n' "$ver" "$latest" | sort -V | tail -1)"
              if [ "$top" = "$latest" ] && [ "$ver" != "$latest" ]; then
                reason="superseded by $latest (its code shipped in a later release)"
              fi
            fi

            if [ -n "$reason" ]; then
              gh issue close "$num" --repo "$REPO" --reason completed \
                -c "Auto-reaped by watchdog-reaper.yml: $reason. Closing this stale tracker (pulp #2576). Reopen if a specific version's binaries are genuinely needed." \
                >/dev/null 2>&1 && closed=$((closed+1))
            fi
          done < trackers.txt

          echo "Reaped $closed / $total stale trackers."
