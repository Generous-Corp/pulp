# WebCLAP → Cloudflare Pages deploy.
#
# Builds the WebCLAP PulpGain module (wasi-sdk, pinned), assembles a
# self-contained deploy dir (examples/web-demos/wclap-build/cloudflare/public),
# PROVES it in headless Chrome (crossOriginIsolated + audio + every subresource
# 200 under the real _headers), and — only once the owner has connected a
# Cloudflare account (secrets present) — deploys it to Cloudflare Pages.
#
# Cloudflare is WebCLAP's canonical host because it can send the COOP/COEP
# headers that cross-origin isolation (threads + SharedArrayBuffer) requires;
# GitHub Pages cannot. Until the two secrets below exist the deploy step is
# skipped and this workflow is a build+proof gate only.
name: WebCLAP Cloudflare

on:
  push:
    branches: [main]
    paths:
      - "core/format/src/wasm/wclap-*.mjs"
      - "examples/web-demos/wclap-build/**"
      - "examples/pulp-gain/**"
      - "tools/cmake/PulpWclap.cmake"
      - "tools/cmake/wasi-toolchain.cmake"
      - ".github/workflows/wclap-cloudflare.yml"
  # No paths filter on pull_request ON PURPOSE: this lane is a REQUIRED status check
  # (branch protection), and a required check that is path-filtered leaves any PR that
  # does not touch those paths stuck forever on "Expected — Waiting for status". It must
  # run on EVERY PR. It ALSO catches the real silent-breakage risk this lane exists for:
  # the wasm UI build hand-lists its sources (PulpWebUi.cmake), so a CORE refactor
  # (core/view/**, core/canvas/**) that splits a TU breaks the link with nothing under
  # examples/web-demos/** touched — invisible to a path-filtered lane. Deploy stays
  # owner-gated + main-only, so a PR run builds + proves and never deploys.
  pull_request:
  # Run this required check on queued merge groups so a merge queue on `main` can
  # land PRs. `merge_group` does not honour a paths filter (like the pull_request
  # lane above, on purpose), and deploy stays owner-gated + main-only, so a group
  # run builds + proves and never deploys — exactly the gate the queue must clear.
  # Without this, the queue would wait forever on a required check that never posts.
  merge_group:
  # Weekly drift check — a broken build is a red run, not a dead site.
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: wclap-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-prove-deploy:
    name: Build + prove + (owner-gated) deploy
    # Scheduled-workflow fork guard: forks should not burn a weekly cron.
    if: github.event_name != 'schedule' || github.repository == vars.PULP_PRIMARY_REPO
    runs-on: ubuntu-latest
    env:
      # Owner-gated deploy switch (a step `if:` cannot read `secrets` directly).
      HAS_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      # The gallery's 23 plugins do NOT live in pulp — they live in two separate
      # public repos (the examples-out-of-core split), and wclap-build/CMakeLists.txt
      # declares each gallery target ONLY IF its plugin header is present. A job that
      # checks out pulp alone therefore builds exactly PulpGain, skips all 23 SILENTLY
      # (by design, so the in-repo build stays green without them) — and then dies in
      # assemble-gallery.mjs with "missing wasm for example-plugins/mono-synth". The
      # skip is quiet; the assemble is not. Without these two checkouts this workflow
      # cannot deploy the gallery at all, which is exactly how it broke.
      - uses: actions/checkout@v4
        with:
          repository: danielraffel/pulp-example-plugins
          path: _ext/pulp-example-plugins
      - uses: actions/checkout@v4
        with:
          repository: danielraffel/pulp-classic-effects
          path: _ext/pulp-classic-effects

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up wasi-sdk (pinned)
        run: |
          set -euo pipefail
          ver=25
          url="https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${ver}/wasi-sdk-${ver}.0-x86_64-linux.tar.gz"
          curl -fsSL "$url" -o /tmp/wasi-sdk.tar.gz
          mkdir -p "$HOME/wasi-sdk"
          tar -xzf /tmp/wasi-sdk.tar.gz -C "$HOME/wasi-sdk" --strip-components=1
          echo "WASI_SDK_PREFIX=$HOME/wasi-sdk" >> "$GITHUB_ENV"

      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install playwright-core
        run: npm install --no-save playwright-core

      - name: Build WebCLAP module
        working-directory: examples/web-demos/wclap-build
        run: |
          set -euo pipefail
          # The two plugin roots default to SIBLINGS of the pulp checkout, which is not
          # where actions/checkout can put them (a `path:` cannot escape the workspace),
          # so point the cache vars at the _ext checkouts above.
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/tools/cmake/wasi-toolchain.cmake" \
            -DPULP_EXAMPLE_PLUGINS_DIR="$GITHUB_WORKSPACE/_ext/pulp-example-plugins" \
            -DPULP_CLASSIC_EFFECTS_DIR="$GITHUB_WORKSPACE/_ext/pulp-classic-effects" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j"$(nproc)"

          # A gallery target that got skipped builds NOTHING and says nothing, and the
          # failure then surfaces hundreds of lines later as a missing wasm in the
          # assembler. Fail here instead, where the cause is legible.
          missing=""
          for p in MonoSynth Chorus; do
            [ -f "build/$p.wasm" ] || missing="$missing $p"
          done
          if [ -n "$missing" ]; then
            echo "::error::gallery plugin wasm not built:$missing — the external plugin" \
                 "checkouts are missing or PULP_EXAMPLE_PLUGINS_DIR/PULP_CLASSIC_EFFECTS_DIR" \
                 "point somewhere wrong, so wclap-build/CMakeLists.txt skipped the targets."
            exit 1
          fi

      # ── The three Emscripten trees the SuperConvolver pages are built from ──────
      #
      # Without these the assembler SKIPS /super-convolver/{wam,wclap}/ and
      # /super-convolver-gpu/ — quietly, with a one-line note — and the deploy then
      # publishes a site with those pages MISSING. Since the deploy replaces the whole
      # site, "skipped" means DELETED from the live URL, not "left as it was". That is a
      # far worse failure than the loud one it replaced, so they are built here.
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.2

      - name: Vendor choc for the WAM build
        run: |
          set -euo pipefail
          git clone --depth 1 --branch pulp-webview-dnd-poc1 \
            https://github.com/danielraffel/choc.git "$HOME/choc-src"
          echo "PULP_WAM_CHOC_INCLUDE=$HOME/choc-src" >> "$GITHUB_ENV"

      - name: Cache the Skia wasm slice
        id: skia-cache
        uses: actions/cache@v4
        with:
          path: ~/skia-wasm
          key: skia-wasm-${{ hashFiles('tools/deps/manifest.json') }}

      - name: Build the WAM, Pulp-UI and WebGPU-DSP modules
        run: |
          set -euo pipefail

          # WAM: the /super-convolver/wam/ page is the same plugin through the other web
          # ABI, and the assembler emits the pair or neither.
          emcmake cmake -S examples/web-demos/wasm-build -B examples/web-demos/wasm-build/build \
            -DCMAKE_BUILD_TYPE=Release -DPULP_WAM_CHOC_INCLUDE="$PULP_WAM_CHOC_INCLUDE"
          cmake --build examples/web-demos/wasm-build/build -j"$(nproc)"

          # Skia wasm slice (Ganesh/WebGL2) — the Pulp UI module's one binary dependency.
          # URL + sha256 come from the manifest, so this lane and the dependency audit
          # cannot disagree about which slice is in use.
          if [ ! -d "$HOME/skia-wasm" ]; then
            read -r url sha < <(python3 - <<'PY'
          import json
          dep = next(d for d in json.load(open("tools/deps/manifest.json"))["dependencies"]
                     if d["name"] == "Skia")
          a = dep["determinism"]["release_assets"]["wasm-wasm32"]
          print(a["url"], a["sha256"])
          PY
          )
            curl -fsSL "$url" -o /tmp/skia-wasm.zip
            echo "$sha  /tmp/skia-wasm.zip" | sha256sum -c -
            mkdir -p "$HOME/skia-wasm"
            unzip -q /tmp/skia-wasm.zip -d "$HOME/skia-wasm"
          fi

          # Pulp's own GPU UI, compiled to wasm. Both SuperConvolver pages mount it.
          emcmake cmake -S examples/web-demos/super-convolver-ui -B build-webui \
            -DCMAKE_BUILD_TYPE=Release -DSKIA_DIR="$HOME/skia-wasm"
          cmake --build build-webui -j"$(nproc)"

          # The Skia-free WebGPU DSP module the GPU page's worker instantiates. Guarded:
          # the GPU-audio lane does not exist on every branch this workflow runs from, and
          # the assembler already omits /super-convolver-gpu/ when its tree is absent. A
          # bare `cmake -S` on a missing dir is a hard error, which would take the whole
          # deploy down for a page that is legitimately not there.
          if [ -d examples/web-demos/gpu-audio ]; then
            emcmake cmake -S examples/web-demos/gpu-audio -B build-gpu-dsp \
              -DCMAKE_BUILD_TYPE=Release
            cmake --build build-gpu-dsp -j"$(nproc)"
          else
            echo "note: examples/web-demos/gpu-audio is not in this tree — /super-convolver-gpu/ will not be emitted."
          fi

      - name: Assemble self-contained deploy dir
        working-directory: examples/web-demos/wclap-build/cloudflare
        run: |
          set -euo pipefail
          node assemble.mjs                 # single-plugin isolation proof (/)
          node assemble-player.mjs          # shared-player WebCLAP demo (/player/)
          gpu_args=""
          [ -d "$GITHUB_WORKSPACE/build-gpu-dsp" ] && gpu_args="--gpu-build $GITHUB_WORKSPACE/build-gpu-dsp"
          # shellcheck disable=SC2086
          node assemble-gallery.mjs \
            --wam-build "$GITHUB_WORKSPACE/examples/web-demos/wasm-build/build" \
            --ui-build  "$GITHUB_WORKSPACE/build-webui" \
            $gpu_args

          # A page the assembler SKIPPED is a page this deploy DELETES from the live site
          # — the deploy replaces the whole thing, so "not emitted" and "removed" are the
          # same event, and the assembler only says so in a one-line note nobody reads.
          # Fail loudly instead. If one of these is genuinely being retired, remove it from
          # this list in the same change.
          #
          # /super-convolver-gpu/ is deliberately NOT listed: it is emitted conditionally
          # (GPU_IR_HANDOFF_WIRED), so requiring it here would hard-fail every deploy made
          # while that page is legitimately withheld. Add it to this list in the same
          # change that makes it unconditional.
          for p in super-convolver/wam super-convolver/wclap; do
            [ -f "public/$p/index.html" ] || {
              echo "::error::$p was NOT assembled — deploying now would delete it from the" \
                   "live site. Its build tree (--wam-build / --ui-build / --gpu-build) is" \
                   "missing or empty; see the assembler's skip note above for which."
              exit 1
            }
          done

      # OG previews are rendered from the ASSEMBLED pages, on every deploy, so a
      # change to a plugin's UI cannot leave a stale unfurl image behind: the
      # screenshot is always taken from the page being shipped. Each plugin page
      # is shot STARTED, so the image is the plugin actually running. The second
      # assemble-gallery pass is required — it bakes the og:image/twitter tags in
      # only for pages whose og.png now exists.
      - name: Render OG preview images (per page, from the started plugin)
        working-directory: examples/web-demos/wclap-build/cloudflare
        run: |
          set -euo pipefail
          node gen-og-images.mjs
          # The second pass MUST get the same build trees as the first. Run bare, it cannot
          # find them, SKIPS every page that needs one — /super-convolver-gpu/ among them —
          # and therefore never rewrites that page's HTML, which is the only thing this pass
          # exists to do. The og.png was shot correctly and then never referenced: the page
          # shipped with no og:image at all and unfurled bare.
          gpu_args=""
          [ -d "$GITHUB_WORKSPACE/build-gpu-dsp" ] && gpu_args="--gpu-build $GITHUB_WORKSPACE/build-gpu-dsp"
          # shellcheck disable=SC2086
          node assemble-gallery.mjs \
            --wam-build "$GITHUB_WORKSPACE/examples/web-demos/wasm-build/build" \
            --ui-build  "$GITHUB_WORKSPACE/build-webui" \
            $gpu_args

      - name: Guard — every demo page has a fresh OG image
        working-directory: examples/web-demos/wclap-build/cloudflare
        run: node check-og-images.mjs

      - name: Prove @danielraffel/web-player adapter unit tests
        working-directory: packages/pulp-web-player
        run: npm test

      - name: "Prove locally (single-plugin: crossOriginIsolated + WebCLAP audio + subresources)"
        working-directory: examples/web-demos/wclap-build/cloudflare
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          set -euo pipefail
          ln -s "$GITHUB_WORKSPACE/node_modules" node_modules
          node validate-deploy.mjs --screenshot /tmp/wclap-cloudflare.png

      - name: "Prove locally (shared player: real-time WebCLAP + param + clap.state, same UI as WAM)"
        working-directory: examples/web-demos/wclap-build/cloudflare
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: node validate-player.mjs --screenshot /tmp/wclap-shared-player.png

      - name: Upload proof screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wclap-cloudflare-proof
          path: |
            /tmp/wclap-cloudflare.png
            /tmp/wclap-shared-player.png
          if-no-files-found: ignore

      # ── Owner-gated deploy ─────────────────────────────────────────────────
      # Runs only after the owner adds CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID
      # repo secrets (see cloudflare/README.md). Until then this step is skipped.
      # (`secrets` is not a valid context in a step `if:` — actionlint — so the
      # presence check is hoisted into the job-level HAS_CF_TOKEN env var.)
      - name: Deploy to Cloudflare Pages
        # ALLOWLIST, not a denylist. This previously read
        # `github.event_name != 'pull_request'`, which silently became TRUE the
        # day the `merge_group:` trigger was added — so every merge group
        # published production from a synthetic gh-readonly-queue commit that had
        # NOT merged and could still be evicted. The file's own comments claimed
        # group runs "never deploy"; the condition disagreed. It only stayed
        # invisible because merge-group runs were starving before reaching this
        # step. Naming the events that MAY deploy fails closed when the next
        # trigger is added.
        if: ${{ contains(fromJSON('["push","schedule","workflow_dispatch"]'), github.event_name) && env.HAS_CF_TOKEN == 'true' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: examples/web-demos/wclap-build/cloudflare
          # --branch main is REQUIRED, not cosmetic. Without it wrangler picks up the
          # current git branch and publishes a PREVIEW alias, while og:image is an
          # absolute production URL — so the card points at a host that has no images
          # and every shared link unfurls blank. Cloudflare serves a missing asset as
          # its 404 page with a 200 status, so a status-code check does not catch it.
          command: pages deploy public --project-name pulp-wclap-demos --branch main

      # The local guard checks the files on disk; only this checks the HOST. Fetch each
      # page as a crawler does, follow its og:image, and assert the bytes are a PNG.
      - name: Guard — the live site actually unfurls
        # ALLOWLIST, not a denylist. This previously read
        # `github.event_name != 'pull_request'`, which silently became TRUE the
        # day the `merge_group:` trigger was added — so every merge group
        # published production from a synthetic gh-readonly-queue commit that had
        # NOT merged and could still be evicted. The file's own comments claimed
        # group runs "never deploy"; the condition disagreed. It only stayed
        # invisible because merge-group runs were starving before reaching this
        # step. Naming the events that MAY deploy fails closed when the next
        # trigger is added.
        if: ${{ contains(fromJSON('["push","schedule","workflow_dispatch"]'), github.event_name) && env.HAS_CF_TOKEN == 'true' }}
        working-directory: examples/web-demos/wclap-build/cloudflare
        run: node check-unfurl.mjs --base https://pulp-wclap-demos.pages.dev
