name: Conflict-marker guard

# Post-merge backstop for the "no committed git conflict markers" invariant.
#
# The pull_request lane (version-skill-check.yml → "Conflict-marker guard")
# scans a PR's MERGE ref and is the first line of defense. But a squash-merge
# whose stale side collides with an already-advanced line (the CMakeLists.txt
# VERSION-line incident) can land a marker on `main` without a clean mergeable
# ref for that PR job to have inspected. This workflow closes that gap: it
# re-runs the whole-tree scan on every push to `main`, so a marker that reaches
# `main` by ANY path reddens the branch immediately and opens a tracking issue.
#
# Cause-agnostic, like the release-cadence watchdog: the trigger is the symptom
# (a marker on main), not whichever merge path produced it. Auto-closes the
# tracker on the next clean push.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: conflict-marker-guard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    # Fork guard: never let a fork's copy of this workflow email its owner.
    if: github.repository == vars.PULP_PRIMARY_REPO
    runs-on: ubuntu-latest
    name: Scan main for conflict markers

    env:
      TRACKING_TITLE: 'Conflict markers committed to main'
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scan tracked tree
        id: scan
        shell: bash
        run: |
          set -uo pipefail
          # Distinguish the guard's exit codes: 0 = clean, 1 = markers found,
          # 2+ = internal error (e.g. not a git tree). Conflating 2+ into
          # "found" would open a factually-wrong "markers committed" issue, so
          # an internal error fails the run WITHOUT touching the tracker.
          python3 tools/scripts/conflict_marker_check.py > markers.txt 2>&1 && rc=0 || rc=$?
          if [ "${rc}" -eq 0 ]; then
            echo "found=0" >> "$GITHUB_OUTPUT"
            echo "Clean: no conflict markers in tracked files."
          elif [ "${rc}" -eq 1 ]; then
            echo "found=1" >> "$GITHUB_OUTPUT"
            echo "Conflict markers found:"
            cat markers.txt
          else
            echo "found=error" >> "$GITHUB_OUTPUT"
            echo "::error::conflict_marker_check.py exited ${rc} (internal error, not a marker finding)"
            cat markers.txt
            exit "${rc}"
          fi

      - name: Render issue body
        if: steps.scan.outputs.found == '1'
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "_Auto-generated by \`.github/workflows/conflict-marker-guard.yml\`._"
            echo ""
            echo "**Invariant violated:** one or more tracked files on \`main\` "
            echo "contain unresolved git conflict markers (\`<<<<<<<\` / \`=======\` / \`>>>>>>>\`). "
            echo "The affected files may not compile or parse."
            echo ""
            echo "Commit \`${GITHUB_SHA}\` triggered this scan."
            echo ""
            echo "### Markers found"
            echo ""
            echo '```'
            cat markers.txt
            echo '```'
            echo ""
            echo "**Resolution:** resolve the conflict in each file and push the "
            echo "fix to \`main\`. This tracker closes automatically on the next "
            echo "clean push. Locally: \`python3 tools/scripts/conflict_marker_check.py\`."
          } > body.md

      - name: Maintain tracking issue
        # Never let issue bookkeeping fail the run: on a clean push a transient
        # `gh` API blip must not redden main, and on a dirty push the separate
        # "Fail the run" step below is the authoritative red signal regardless
        # of whether opening the tracker succeeded.
        continue-on-error: true
        shell: bash
        env:
          FOUND: ${{ steps.scan.outputs.found }}
        run: |
          set -euo pipefail
          repo='${{ github.repository }}'
          title="${TRACKING_TITLE}"

          existing_json=$(
            gh issue list --repo "$repo" --state all \
              --search "in:title \"${title}\"" \
              --json number,title,state \
              --jq "[.[] | select(.title == \"${title}\")] | first // {}"
          )
          existing=$(echo "$existing_json" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('number','') or '')")
          existing_state=$(echo "$existing_json" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('state','') or '')")

          if [ "$FOUND" = "0" ]; then
            if [ -n "${existing:-}" ] && [ "$existing_state" = "OPEN" ]; then
              echo "Markers cleared — closing #${existing}."
              gh issue comment "$existing" --repo "$repo" \
                --body "Clean push $(date -u +%Y-%m-%d\ %H:%M\ UTC) — no conflict markers remain. Closing."
              gh issue close "$existing" --repo "$repo" --reason completed
            else
              echo "Clean and no open tracker — nothing to do."
            fi
            exit 0
          fi

          if [ -z "${existing:-}" ]; then
            echo "Opening tracking issue."
            gh issue create --repo "$repo" --title "$title" --body-file body.md --label ci 2>&1 || \
              gh issue create --repo "$repo" --title "$title" --body-file body.md
          else
            echo "Updating tracking issue #${existing}."
            gh issue edit "$existing" --repo "$repo" --body-file body.md
            gh issue reopen "$existing" --repo "$repo" 2>/dev/null || true
          fi

      - name: Fail the run if markers are present
        if: steps.scan.outputs.found == '1'
        run: |
          echo "::error::Conflict markers are present on main — see the tracking issue." >&2
          exit 1
