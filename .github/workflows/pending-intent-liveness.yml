name: Pending-intent liveness

# Time-based backstop for the single-writer version-at-land bot. The
# auto-release stranded-fix detector is taught to treat a pending authored
# intent as COVERED (so it doesn't false-warn on every intent-only merge); that
# correctness choice blinds it to the case where the bot never runs or never
# succeeds. This scheduled check catches exactly that: a positive
# `Version-Bump: <surface>=<level>` intent after the newest
# `Version-Bump-Applied` marker that has stayed unapplied past the grace window.
# See tools/scripts/pending_intent_liveness.py and
# docs/guides/version-at-land-cutover.md.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      grace_minutes:
        description: "Minutes an intent may stay unapplied before alarming"
        required: false
        default: "45"

concurrency:
  group: pending-intent-liveness
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  check:
    if: github.event_name != 'schedule' || github.repository == vars.PULP_PRIMARY_REPO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0  # need history back to the last applied marker

      - name: Assess pending intent
        id: assess
        env:
          PULP_PENDING_INTENT_GRACE_MIN: ${{ github.event.inputs.grace_minutes || '45' }}
        run: |
          set -euo pipefail
          if python3 tools/scripts/pending_intent_liveness.py \
              --repo . --config tools/scripts/versioning.json --head main \
              --json > liveness.json; then
            echo "overdue=0" >> "$GITHUB_OUTPUT"
          else
            echo "overdue=1" >> "$GITHUB_OUTPUT"
          fi
          cat liveness.json

      - name: Open/refresh tracker on overdue intent
        if: steps.assess.outputs.overdue == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          title="release: stuck — version intent unapplied past grace window"
          body=$(python3 - <<'PY'
          import json
          d = json.load(open("liveness.json"))
          rows = d.get("overdue", [])
          print("_Auto-generated by `.github/workflows/pending-intent-liveness.yml`._\n")
          print("A positive `Version-Bump:` intent has stayed UNAPPLIED past the grace")
          print("window. The single-writer `version-at-land` bot did not run or failed —")
          print("consumers cannot reach the change until the number is assigned.\n")
          print(f"**Base marker:** `{str(d.get('base'))[:12]}`\n")
          print("**Overdue:**\n")
          for r in rows:
              print(f"- `{r['surface']}={r['level']}` — pending {r['age_minutes']} min")
          print("\n**Likely causes:** version-at-land workflow disabled, a `paths:`")
          print("filter miss, the release bot cannot push a signed commit to `main`, or")
          print("`--ff-only` retries exhausted. See docs/guides/version-at-land-cutover.md.")
          PY
          )
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
              --search "in:title \"version intent unapplied\"" \
              --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -n "$existing" ]; then
              gh issue edit "$existing" --repo "$GITHUB_REPOSITORY" --body "$body"
              gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" \
                  --body "Still overdue as of $(date -u '+%Y-%m-%d %H:%M UTC')."
          else
              gh api -X POST "/repos/${GITHUB_REPOSITORY}/labels" \
                  -f name="release-stuck" -f color="b60205" \
                  -f description="A user-facing change is waiting for a versioned release" \
                  >/dev/null 2>&1 || true
              gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" \
                  --body "$body" --label "bug,ci,blocks-release,release-stuck" \
              || gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body"
          fi

      - name: Fail the run so the schedule surfaces it
        if: steps.assess.outputs.overdue == '1'
        run: exit 1
