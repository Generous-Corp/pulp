name: Runner topology check

# Outcome-based invariant: "every routing lane resolves to something that can
# actually serve it."
#
# GitHub does not validate `runs-on`. A job asking for a label no runner
# carries is not an error — it is QUEUED, forever, and looks exactly like a
# busy pool. So a routing variable can be pointed at a label nothing owns and
# the only symptom is jobs piling up while the fleet "looks saturated". A
# relief valve routed into a black hole is worse than no relief valve: it
# reports healthy and relieves nothing.
#
# WHY A CRON AND NOT A PR GATE
#   The invariant is about LIVE fleet state, not about the diff. It can break
#   with no commit at all — a runner is decommissioned, a host is renamed, a
#   variable is edited in the web UI. A PR gate would never see any of that,
#   would add a live API call (and its flakiness) to the required macOS gate,
#   and would burn the API budget on every push. The fleet is the thing that
#   drifts, so the fleet is what gets swept.
#
#   The half that IS diff-shaped — is the contract itself well-formed, are the
#   lanes internally consistent — is a ctest (`runner-topology-selftest`) with
#   no network access, so it runs on every PR for free.
#
# WHY GITHUB-HOSTED
#   This job must not depend on the pool it is auditing. When the self-hosted
#   Macs are saturated or wedged — precisely when a black hole matters most —
#   a self-hosted check would queue behind the jobs it is supposed to explain.
#
# FAIL-CLOSED ON UNREADABLE STATE
#   `actions/runners` needs `Administration: Read`, which the default
#   GITHUB_TOKEN does not carry (see the note in build.yml's busy probe, whose
#   403 fallback silently disables overflow — the same bug class this workflow
#   exists to catch). The checker exits 2 on an API failure, distinct from both
#   pass (0) and violation (1), so a token/permission problem surfaces as a
#   loud failure instead of a false green.

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Log findings but do not touch the tracking issue'
        required: false
        default: 'false'

permissions:
  contents: read
  issues: write

concurrency:
  group: runner-topology-check
  cancel-in-progress: false

jobs:
  check:
    if: github.event_name != 'schedule' || github.repository == vars.PULP_PRIMARY_REPO
    runs-on: ubuntu-latest
    name: Reconcile routing lanes against live runners

    env:
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      TRACKING_TITLE: 'Runner topology: a routing lane points at labels nothing serves'
      # RELEASE_BOT_TOKEN carries Administration: Read; GITHUB_TOKEN does not.
      # The fallback keeps the workflow honest rather than green: without the
      # scope the API call fails and the checker exits 2.
      GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
      PULP_GH_CLI: gh

    steps:
      - uses: actions/checkout@v5

      - name: Reconcile topology
        id: reconcile
        shell: bash
        run: |
          set -uo pipefail
          set +e
          python3 tools/scripts/runner_topology_check.py \
              --mode=report --repo "${GITHUB_REPOSITORY}" > report.txt 2>report.err
          rc=$?
          set -e

          echo "rc=${rc}" >> "$GITHUB_OUTPUT"
          cat report.txt
          if [ -s report.err ]; then cat report.err >&2; fi

          {
            echo "### Runner topology"
            echo ""
            echo '```'
            cat report.txt
            [ -s report.err ] && cat report.err
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          case "${rc}" in
            0) echo "topology OK" ;;
            1) echo "topology VIOLATION — see report" ;;
            2) echo "topology UNREADABLE — live state could not be fetched" ;;
          esac

      - name: Render issue body
        if: env.DRY_RUN != 'true' && steps.reconcile.outputs.rc != '0'
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "_Auto-generated by \`.github/workflows/runner-topology-check.yml\` on $(date -u '+%Y-%m-%d %H:%M UTC')._"
            echo ""
            if [ "${{ steps.reconcile.outputs.rc }}" = "2" ]; then
              echo "**Live fleet state could not be read.** This check cannot"
              echo "confirm the routing invariant, so it fails rather than"
              echo "report a false green. Usual cause: the token lacks"
              echo "\`Administration: Read\` for the runners API."
            else
              echo "**Invariant violated:** one or more routing lanes resolve to a"
              echo "label set nothing can serve, or a repo variable drifted from the"
              echo "reviewed contract in \`tools/scripts/runner_topology.json\`."
              echo ""
              echo "This failure mode is SILENT in GitHub: jobs routed at a label no"
              echo "runner carries are queued, not rejected. The symptom operators see"
              echo "is \"jobs pile up while the pool looks busy\" — never an error."
            fi
            echo ""
            echo "### Report"
            echo ""
            echo '```'
            cat report.txt
            [ -s report.err ] && cat report.err
            echo '```'
            echo ""
            echo "**Resolution:** reconcile the repo variable and the contract together"
            echo "(they are one artifact), or bring the provisioner for those labels"
            echo "back online. See \`docs/guides/local-ci.md\` → \"Routing contract\"."
            echo ""
            echo "This tracker closes automatically on the next sweep once every lane resolves."
          } > body.md
          cat body.md

      - name: Maintain tracking issue
        if: env.DRY_RUN != 'true'
        shell: bash
        run: |
          set -euo pipefail

          existing=$(gh issue list --repo "${GITHUB_REPOSITORY}" \
              --state open --search "\"${TRACKING_TITLE}\" in:title" \
              --json number --jq '.[0].number // empty')

          if [ "${{ steps.reconcile.outputs.rc }}" = "0" ]; then
              if [ -n "${existing}" ]; then
                  gh issue comment "${existing}" --repo "${GITHUB_REPOSITORY}" \
                      --body "Every routing lane resolves again. Closing."
                  gh issue close "${existing}" --repo "${GITHUB_REPOSITORY}"
              fi
              exit 0
          fi

          if [ -n "${existing}" ]; then
              gh issue edit "${existing}" --repo "${GITHUB_REPOSITORY}" --body-file body.md
          else
              gh issue create --repo "${GITHUB_REPOSITORY}" \
                  --title "${TRACKING_TITLE}" --body-file body.md
          fi

      - name: Fail on violation
        if: steps.reconcile.outputs.rc != '0'
        run: |
          echo "Runner topology check failed (exit ${{ steps.reconcile.outputs.rc }})."
          exit 1
