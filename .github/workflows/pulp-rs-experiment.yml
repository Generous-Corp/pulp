# pulp-rs-experiment.yml — Evaluation-only CI for the Rust prototype.
#
# Scope: runs *only* on the `explore/rust-cli-prototype` branch. This
# workflow is intentionally never merged to `main` — the branch itself
# is an exploration per CLAUDE.md's "Exploration → Validation → Landing"
# flow, so `main` will never see this file.
#
# Gates enforced:
#   - cargo fmt --check                    (style)
#   - cargo clippy -D warnings -W pedantic (lint, build on all platforms)
#   - cargo test                           (unit + integration + parity + snapshots + doctests)
#   - cargo bench --no-run                 (benches still compile)
#   - cargo doc --no-deps                  (rustdoc links resolve)
#
# Evaluation lens (issue #686):
#   - Cross-platform CI      — does cargo build/test green on mac/ubuntu/win?
#   - Test ergonomics        — do parity tests run quickly and in CI?
#
# Not in scope here: parity against a live C++ CLI in CI. The C++ CLI
# isn't built in this job (that would couple the prototype to the main
# build, violating the "no production coupling" criterion). Parity is
# validated locally with `PULP_CLI_PATH=<built pulp>` against the
# captured `expected.json` files.

name: pulp-rs experiment

on:
  push:
    branches:
      - explore/rust-cli-prototype
    paths:
      - 'experimental/pulp-rs/**'
      - '.github/workflows/pulp-rs-experiment.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: quality (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: experimental/pulp-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust (with rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: experimental/pulp-rs

      # Style and lint first — fastest-failing checks go at the top so
      # a busted commit wastes as little CI time as possible.
      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy -D warnings -W pedantic
        run: >-
          cargo clippy --all-targets --all-features --
          -D warnings
          -W clippy::pedantic
          -W clippy::nursery

      # Build before test so test failures aren't confounded by a
      # missing binary.
      - name: cargo build --release
        run: cargo build --release

      # Parity tests compare against captured expected.json, which
      # references the path the fixtures were captured on. Each parity
      # test normalises machine-specific fields before comparison so
      # this runs portably in CI — no C++ CLI needed.
      - name: cargo test --release
        run: cargo test --release

      # Benches must still compile even though we don't run them in CI
      # (noisy on shared runners). A `--no-run` check catches drift
      # between the benchmark code and the library API.
      - name: cargo bench --no-run
        run: cargo bench --no-run

      # Catch broken intra-doc links and missing `# Errors` sections.
      - name: cargo doc --no-deps
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      # Rust coverage — measured on Linux only (Codecov pipeline is
      # Linux-native and mac/windows coverage would just duplicate
      # signal). cargo-llvm-cov wraps cargo test with llvm-cov's
      # instrumentation so we can emit Cobertura XML compatible with
      # Pulp's existing coverage tooling. Flagged as `rust-prototype`
      # so it's visible alongside the C++ / Python / Swift / Kotlin
      # lanes but clearly distinguishable.
      #
      # When the Rust CLI swap lands (Phase 8 per
      # planning/rust-cli-migration-plan.md), flip this flag to
      # `cli-rust` + add a tier entry to ci/coverage-targets.yaml.
      - name: Install cargo-llvm-cov
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: cargo llvm-cov (cobertura)
        if: matrix.os == 'ubuntu-latest'
        run: cargo llvm-cov --all-features --workspace --cobertura --output-path cobertura.xml

      - name: Upload coverage to Codecov (rust-prototype flag)
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: experimental/pulp-rs/cobertura.xml
          flags: rust-prototype
          name: pulp-rs
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
