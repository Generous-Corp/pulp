name: Android Build

on:
  pull_request:
    paths:
      - 'android/**'
      - 'core/**'
      - 'tools/cmake/PulpAndroid.cmake'
      - 'CMakeLists.txt'
      - '.github/workflows/android.yml'
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'core/**'
      - 'tools/cmake/PulpAndroid.cmake'
      - 'CMakeLists.txt'

# Cancel superseded PR runs when a new commit lands on the same ref.
# Main-branch pushes share `refs/heads/main` so consecutive main runs
# still serialize under the same group — acceptable: Android-on-main
# is a background signal, not a release gate.
concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;30.0.14904198"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/app/.cxx
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Android APK (arm64-v8a + x86_64)
        working-directory: android
        run: ./gradlew assembleDebug
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/30.0.14904198

      - name: Verify APK contains libpulp.so
        shell: bash
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          echo "--- APK full contents ---"
          unzip -l "$APK" || echo "(APK unreadable)"
          echo "---"
          if unzip -l "$APK" | grep -q "libpulp.so"; then
            echo "✅ libpulp.so found in APK"
            unzip -l "$APK" | grep "\.so"
          else
            echo "❌ libpulp.so NOT found in APK"
            exit 1
          fi

      # Always upload APK + Gradle/NDK logs so a failed "Verify APK"
      # step (historically flaky on windows-latest — #403, #418) can
      # be diagnosed from artifacts instead of requiring a close/reopen
      # retry cycle. The `if: always()` ensures this runs even when the
      # verify step above fails.
      - name: Upload APK + build logs (diagnostic)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pulp-android-${{ matrix.os }}-diag
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/logs/**
            android/app/.cxx/**/build.ninja
            android/app/.cxx/**/CMakeCache.txt
            android/app/.cxx/**/CMakeFiles/CMakeOutput.log
            android/app/.cxx/**/CMakeFiles/CMakeError.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: pulp-android-${{ matrix.os }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  android-kotlin-coverage:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;30.0.14904198"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: android-coverage-${{ runner.os }}-${{ hashFiles('android/**/*.gradle.kts', 'android/app/src/test/**/*.kt') }}
          restore-keys: |
            android-coverage-${{ runner.os }}-
            ${{ runner.os }}-gradle-

      - name: Run Kotlin unit tests + JaCoCo report
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest :app:jacocoDebugUnitTestReport
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/30.0.14904198

      - name: Verify JaCoCo XML exists
        shell: bash
        run: |
          xml=android/app/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml
          test -s "$xml" || {
            echo "::error::Android JaCoCo XML is missing or empty."
            exit 1
          }
          python3 - <<'PY'
          import pathlib
          import sys
          import xml.etree.ElementTree as ET

          path = pathlib.Path(
              "android/app/build/reports/jacoco/jacocoDebugUnitTestReport/"
              "jacocoDebugUnitTestReport.xml"
          )
          root = ET.parse(path).getroot()
          line = root.find("counter[@type='LINE']")
          if line is None:
              print("::error::Android JaCoCo XML has no LINE counter.")
              sys.exit(1)
          total = int(line.attrib["missed"]) + int(line.attrib["covered"])
          if total == 0:
              print("::error::Android JaCoCo XML reports zero measured lines.")
              sys.exit(1)
          print(f"Android JaCoCo XML lines: {line.attrib['covered']}/{total}")
          PY

      - name: Upload Kotlin coverage artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: android-kotlin-coverage-${{ github.sha }}
          path: |
            android/app/build/reports/jacoco/jacocoDebugUnitTestReport/**
            android/app/build/reports/tests/testDebugUnitTest/**
          retention-days: 14
          if-no-files-found: error

      - name: Upload Android Kotlin coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: android/app/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  # Emulator test — only on macOS (KVM not available on GitHub Windows runners).
  # This is a native-init smoke: boots a headless arm64-v8a emulator, installs
  # the arm64-only debug APK, launches PulpActivity, and greps logcat for the
  # JNI_OnLoad marker. Full GPU/rendering validation is out of scope here
  # (tracked under #77).
  #
  # Re-gated 2026-04 after #530 (re-enable attempt) proved a third failure
  # mode beyond the two originally documented in #487:
  #
  #   1. ABI mismatch (x86_64 emulator vs arm64-only APK) — fixed in workflow.
  #   2. Wrong launch intent (com.pulp vs com.pulp.app) — fixed in workflow.
  #   3. `macos-latest` is now Apple Silicon (ARM64). Booting an arm64-v8a
  #      Android system image via QEMU + HVF hits `HV_UNSUPPORTED`, so
  #      `qemu-system-aarch64-headless` exits with "failed to initialize HVF:
  #      Invalid argument" immediately after startup. `adb wait-for-device`
  #      then hangs, and the job burns its full `timeout-minutes: 20`.
  #
  # The AVD arch + `am start` intent below are still the matched pair for
  # the APK (arm64-v8a / com.pulp.app/com.pulp.PulpActivity); do not change
  # one without the other. What's missing is a runner that can actually
  # accelerate arm64 Android guests — Linux arm64 + KVM, x86_64 APK + x86_64
  # emulator, or a self-hosted ARM macOS with nested-HVF — see #487 for the
  # path-forward discussion.
  #
  # `PULP_ANDROID_EMULATOR_ENABLED=true` in repo vars re-enables the job
  # once a working runner configuration lands.
  android-emulator-test:
    if: ${{ vars.PULP_ANDROID_EMULATOR_ENABLED == 'true' }}
    runs-on: macos-latest
    needs: android-build
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and emulator
        run: |
          sdkmanager "ndk;30.0.14904198"
          sdkmanager "system-images;android-34;google_apis;arm64-v8a"
          sdkmanager "emulator"

      - name: Download APK
        uses: actions/download-artifact@v5
        with:
          name: pulp-android-macos-latest

      - name: Create AVD and boot emulator
        run: |
          echo "no" | avdmanager create avd -n pulp-ci -k "system-images;android-34;google_apis;arm64-v8a" --force
          $ANDROID_HOME/emulator/emulator -avd pulp-ci -no-window -no-audio -no-boot-anim &
          adb wait-for-device
          # Wait for boot (up to 120s across 60 × 2s checks).
          for _ in $(seq 1 60); do
            BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            [ "$BOOT" = "1" ] && echo "Emulator booted" && break
            sleep 2
          done

      - name: Install and launch
        run: |
          adb install app-debug.apk
          adb shell am start -n com.pulp.app/com.pulp.PulpActivity
          sleep 5

      - name: Verify JNI bridge initialization
        run: |
          adb logcat -d -s Pulp:V | tee /tmp/pulp-logcat.txt
          if grep -q "JNI_OnLoad: Pulp native bridge initialized" /tmp/pulp-logcat.txt; then
            echo "✅ JNI bridge initialized successfully"
          else
            echo "❌ JNI bridge did not initialize"
            cat /tmp/pulp-logcat.txt
            exit 1
          fi

      - name: Kill emulator
        if: always()
        run: adb emu kill 2>/dev/null || true
