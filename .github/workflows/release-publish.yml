name: Release publish coordinator

# GitHub now makes a PUBLISHED release IMMUTABLE — no further asset uploads.
# Pulp builds one release from TWO parallel tag-triggered workflows:
#   - "Release CLI"       → CLI binaries (artifacts/**)
#   - "Sign and Release"  → macOS sign/notarize + appcast.xml
# Whichever published first locked the other out ("Cannot upload asset to an
# immutable release"), so releases shipped incomplete (e.g. CLI without the
# Sparkle appcast). Both now create the release as a DRAFT on a tag push
# (release-cli only on `push`; sign-and-release already did). This coordinator
# publishes that draft EXACTLY ONCE — when BOTH legs have succeeded for the same
# tagged commit. If either leg fails, the release stays a draft (incomplete
# releases never publish) and `release-health.yml` flags the stuck draft.

on:
  workflow_run:
    workflows: ["Release CLI", "Sign and Release"]
    types: [completed]

permissions:
  contents: write   # publish (un-draft) the release
  actions: read     # read sibling workflow_run conclusions

concurrency:
  # Serialize per tag so the two legs' completions can't double-publish.
  group: release-publish-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # Only tag-push release runs (vX.Y.Z). Manual dispatch backfills publish
    # directly in release-cli.yml and never become a coordinated draft.
    if: >-
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    steps:
      # Use the current default-branch coordinator code. A release tag may have
      # been created before this helper existed, but the draft assets still need
      # the current publish gate.
      - uses: actions/checkout@v5

      - name: Publish draft once both release legs succeed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.workflow_run.head_branch }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          echo "Triggered by '${{ github.event.workflow_run.name }}' for ${TAG} (${SHA})."

          # Both required legs must have a SUCCESSFUL run for this exact commit.
          ok=1
          for wf in "Release CLI" "Sign and Release"; do
            concl=$(gh api "repos/${REPO}/actions/runs?head_sha=${SHA}&per_page=100" \
              --jq "[.workflow_runs[] | select(.name==\"${wf}\")] | sort_by(.run_started_at) | last | .conclusion // \"none\"")
            echo "  ${wf}: ${concl}"
            [ "${concl}" = "success" ] || ok=0
          done
          if [ "${ok}" != "1" ]; then
            echo "Not both legs successful yet — leaving ${TAG} as a draft (will re-evaluate on the other leg's completion)."
            exit 0
          fi

          required_assets=(
            appcast.xml
            pulp-darwin-arm64.tar.gz
            pulp-linux-arm64.tar.gz
            pulp-linux-x64.tar.gz
            pulp-windows-arm64.zip
            pulp-windows-x64.zip
            pulp-sdk-darwin-arm64.tar.gz
            pulp-sdk-linux-arm64.tar.gz
            pulp-sdk-linux-x64.tar.gz
            pulp-sdk-windows-arm64.tar.gz
            pulp-sdk-windows-x64.tar.gz
          )

          # Publish the draft. Idempotent: if a prior coordinator run already
          # published it, isDraft is false and we no-op. The checksum manifest is
          # generated immediately before publish because this is the one point
          # where both release-producing workflows have uploaded their assets
          # and the release is still mutable.
          state=$(gh release view "${TAG}" --repo "${REPO}" --json isDraft --jq .isDraft 2>/dev/null || echo "missing")
          if [ "${state}" = "true" ]; then
            rm -rf release-assets
            mkdir -p release-assets
            gh release download "${TAG}" --repo "${REPO}" --dir release-assets --clobber

            # Intel (darwin-x64) CLI+SDK is an ADVISORY release leg
            # (release-cli.yml, continue-on-error): present when the
            # macos-15-intel build succeeded, absent otherwise. Because the
            # publish check runs --exact-required, the pair must be listed
            # as required WHEN PRESENT (or --exact-required rejects them as
            # "unexpected" and the release stays a draft — the success-path
            # bug), yet must NOT be required unconditionally (that would
            # negate the advisory design and block every release whenever
            # the Intel runner is down). build-cli uploads both Intel
            # archives from one job, so they arrive atomically (both/neither).
            if [ -f release-assets/pulp-darwin-x64.tar.gz ]; then
              required_assets+=(pulp-darwin-x64.tar.gz pulp-sdk-darwin-x64.tar.gz)
              echo "Intel (darwin-x64) assets present — requiring them in the manifest."
            else
              echo "Intel (darwin-x64) assets absent (advisory leg did not publish) — release proceeds without them."
            fi

            checksum_args=()
            for asset in "${required_assets[@]}"; do
              checksum_args+=(--required-name "${asset}")
            done

            python3 tools/scripts/release_checksum_manifest.py generate release-assets \
              --output release-assets/SHA256SUMS \
              --exact-required \
              "${checksum_args[@]}"
            python3 tools/scripts/release_checksum_manifest.py verify \
              release-assets release-assets/SHA256SUMS

            gh release upload "${TAG}" release-assets/SHA256SUMS --repo "${REPO}" --clobber

            gh release edit "${TAG}" --repo "${REPO}" --draft=false --latest
            echo "::notice::Published release ${TAG} (both CLI + sign-and-release legs succeeded)."
          elif [ "${state}" = "false" ]; then
            echo "${TAG} already published — nothing to do."
          else
            echo "::warning::No release object for ${TAG} (state=${state}); nothing to publish."
          fi
