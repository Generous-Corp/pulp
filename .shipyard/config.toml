# Shipyard configuration for Pulp.
#
# This file declares Pulp's CI targets, validation pipeline, and merge
# requirements in a form that Shipyard understands. Per-machine secrets
# (SSH host details, runner credentials) live in .shipyard.local/
# (gitignored) — see .shipyard.local/config.toml.example for the
# template, and run `shipyard doctor` to verify everything is wired up.
#
# To use this config:
#   ./tools/install-shipyard.sh   # install pinned Shipyard binary
#   shipyard doctor               # verify reachability + config sanity
#   shipyard run                  # validate the current branch
#   shipyard ship                 # PR + validate + merge on green

[project]
name      = "pulp"
type      = "cmake"
# Shipyard governance profile. `solo` matches Pulp's single-maintainer
# branch-protection posture (0 required approvals, self-merge on green).
profile   = "solo"
# The platforms Pulp ships. Not the set Shipyard validates locally — see
# "Targets" below: `mac` is the only declared target, and Linux/Windows
# validate as advisory GitHub-hosted lanes.
platforms = ["macos", "linux", "windows"]

# ── Gate script paths (Shipyard v0.19.1+ path discovery) ───────────────────
# Pulp keeps the skill-sync, version-bump, and versioning-config files
# under tools/scripts/. Shipyard v0.19.1+ auto-discovers this layout, but
# we pin the paths explicitly here so any future Shipyard bump can't
# accidentally drop the discovery order and silently fall back to
# scripts/ (which Pulp doesn't use).
[validation]
skill_sync_script   = "tools/scripts/skill_sync_check.py"
version_bump_script = "tools/scripts/version_bump_check.py"
versioning_config   = "tools/scripts/versioning.json"

# ── Validation pipeline ────────────────────────────────────────────────────
# Each stage maps to a step in tools/validate-build.sh. Shipyard runs
# them in order; stage failure short-circuits the pipeline.
#
# Stage names are ["setup", "configure", "build", "test"] only —
# Shipyard v0.1.2's executors compose those four canonical stages
# when building remote commands. Custom stage names like "install" or
# "smoke" are silently dropped on the ssh-windows backend, so we
# fold those steps into the canonical four for now and revisit when
# Shipyard supports arbitrary stage lists end-to-end.
#
# Build parallelism must never be unbounded. A bare `--parallel` (no count)
# delegates to the generator's default, which for Unix Makefiles is `make -j`
# with NO limit — it fans out one compile per ready translation unit and can
# exhaust memory / oversubscribe cores on a shared machine.
#
# The POSIX backends (mac `local`, ssh-linux) run through
# `tools/ci/governed-build.sh`, which acquires a tartci host build-lease when
# one is available (so a validation build shares the host's core/memory budget
# with concurrent agent builds instead of racing them) and otherwise falls back
# to a bounded local `-j`. The ssh-windows overrides below use a fixed cap
# instead: they run under PowerShell (no `$(...)` or wrapper path assumptions)
# and unlimited MSBuild link parallelism triggers LNK1104 on ARM64.

# ── CMAKE_BUILD_TYPE=Debug IS DELIBERATE. DO NOT "FIX" IT. ───────────────────
#
# This contradicts CLAUDE.md ("Release is the default") and reads exactly like
# config drift, so a tidy-minded config audit will want to flip it to Release.
# Don't. This -O0 lane is the ONLY thing in CI that can see a whole class of
# undefined behaviour.
#
# 2026-07-12: it caught a real ODR violation (#6081). `snap_to_zero()` is an inline
# function template defined in a header, its body gated by a macro, and a test TU
# redefined that macro before including it. Two TUs then emitted the SAME mangled
# symbol with DIFFERENT bodies.
#
#   at -O3  each TU inlines its own copy, so each behaves per its own macro.
#           The A/B test appears to work. RELEASE IS GREEN. The bug is invisible
#           by construction — a Release-only lane cannot ever see it.
#   at -O0  nothing is inlined. Both TUs emit a weak symbol, the linker keeps ONE
#           arbitrarily, and both call it. DEBUG IS RED.
#
# The red test was the mild outcome: had the linker kept the other definition, the
# assertions would have PASSED while exercising a no-op — a null test asserting
# nothing, green forever.
#
# Debug is slower, and CLAUDE.md is right that it is the wrong default for most
# work. The answer is not "Debug everywhere" — it is "keep ONE -O0 lane, and
# calibrate perf gates for the build they actually run in." A perf gate that fails
# here is a MIS-CALIBRATED GATE, not a reason to flip the lane: see
# test/test_yoga_layout_bench.cpp, whose timing assertion was sized for -O3 and is
# now `#ifdef NDEBUG`-gated. Guarded by tools/scripts/test_odr_macro_gated_headers.py.
[validation.default]
stages = ["setup", "configure", "build", "test"]
setup     = "./setup.sh --ci --deps-only"
configure = "cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DPULP_BUILD_TESTS=ON -DPULP_BUILD_EXAMPLES=ON"
build     = "tools/ci/governed-build.sh cmake --build build"
# `--label-exclude slow` skips ctest entries tagged LABELS slow — currently
# `cmake-ios-auv3-configure` (test/CMakeLists.txt:23, ~25-30 min fresh-cache
# Xcode/iOS try-compile + FetchContent bootstrap). #1589 added the label
# for PR validation exclusion; the shipyard test command never picked up
# the flag, so every PR was paying the slow-iOS cost. Full-CI (push to
# main, nightly, workflow_dispatch) can still run it via a different
# stage if needed — this only excludes from per-PR validation.
test      = "ctest --test-dir build --output-on-failure --exclude-regex AudioWorkgroup --label-exclude slow"

# Per-target overrides — ssh-windows needs `cmake --build` with the
# Visual Studio multi-config generator's --config flag. The base
# build line above is left platform-neutral; this section refines it
# for the Windows target only.
#
# Windows test exclusions (--exclude-regex):
#   AudioWorkgroup  — macOS-only API, no Windows implementation
#   Toolbar add items — SEGFAULT in headless Yoga layout (no parent
#                       context), tagged [!mayfail] but CTest still
#                       reports failure because the crash kills the
#                       executable before Catch2 processes the tag
#   EventLoop       — timing-sensitive dispatch tests that flake on
#                     the ARM64 Windows VM (50ms sleep not reliable
#                     under SSH + cross-compile emulation overhead)
[validation.default.overrides.windows]
configure = "cmake -S . -B build -G \"Visual Studio 17 2022\" -A x64 -DPULP_BUILD_TESTS=ON -DPULP_BUILD_EXAMPLES=ON"
# --parallel is capped at 4 to limit MSBuild parallelism. Unlimited
# parallelism causes LNK1104 (cannot open file) on ARM64 Windows because
# concurrent x64-emulated link steps create file contention that Windows'
# file locking can't handle gracefully.
build     = "cmake --build build --config Release --parallel 4"
# Only exclude tests with genuine platform incompatibility or
# undiagnosable crashes. Timing-sensitive tests (EventLoop,
# BufferingReader, VisualizationBridge) were fixed with proper
# wait_until patterns and longer timeouts — no longer excluded.
test      = "ctest --test-dir build -C Release --output-on-failure --exclude-regex \"AudioWorkgroup|Toolbar add items\" --label-exclude slow"

[validation.gates]
# Layer-3 authoritative gates — same scripts CI runs via
# .github/workflows/version-skill-check.yml. Named `gates` so you can
# run it standalone with `shipyard run --pipeline gates`. Shipyard's
# executors only support the canonical stage set, so all gate checks
# are chained into the `setup` step and exit non-zero on first failure.
#
# PULP_ENFORCE_PREPUSH=1 makes the pre-push hook upgrade warnings to
# errors; the Python scripts inspect the same env var for parity.
# See docs/guides/versioning.md for the full three-layer design.
stages = ["setup"]
setup = "PULP_ENFORCE_PREPUSH=1 python3 tools/scripts/skill_sync_check.py --base origin/main --mode=report && PULP_ENFORCE_PREPUSH=1 python3 tools/scripts/version_bump_check.py --base origin/main --mode=report && python3 tools/scripts/hotspot_size_guard.py --base origin/main --config tools/scripts/hotspot_size_guard.json --mode=report && python3 tools/scripts/build_parallelism_guard.py && python3 tools/import-validation/check-source-contracts.py --strict && python3 tools/import-validation/test_source_contracts.py"

[validation.parser]
# Path-scoped lane for runtime-import parser PRs (pulp #1916).
#
# Triggered when a diff only touches the parser-import scope defined in
# tools/scripts/validation_profile_select.py — the standalone
# import-design tool, the import-validation scripts, the pulp-import-ir
# package, parser fixtures, and the parser-specific test surface. Run
# it explicitly with `shipyard run --pipeline parser`; the selector
# script prints `parser` or `default` so wrappers can pick the matching
# lane without rolling their own classifier.
#
# Configure step disables PULP_BUILD_EXAMPLES, which keeps the plugin
# validator CTest entries (auval / pluginval / clap-validator,
# registered in examples/pulp-*/CMakeLists.txt) out of the test
# discovery list entirely — those failures motivated #1916 in the first
# place. The test step filters by the `parser-import` CTest label
# (test/CMakeLists.txt) so even if a non-example validator slips in,
# it stays out of the lane. `slow` is excluded for symmetry with
# [validation.default].
stages = ["setup", "configure", "build", "test"]
setup     = "./setup.sh --ci --deps-only"
configure = "cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DPULP_BUILD_TESTS=ON -DPULP_BUILD_EXAMPLES=OFF"
build     = "tools/ci/governed-build.sh cmake --build build"
test      = "ctest --test-dir build --output-on-failure --label-include parser-import --exclude-regex AudioWorkgroup --label-exclude slow"

[validation.parser.overrides.windows]
configure = "cmake -S . -B build -G \"Visual Studio 17 2022\" -A x64 -DPULP_BUILD_TESTS=ON -DPULP_BUILD_EXAMPLES=OFF"
build     = "cmake --build build --config Release --parallel 4"
test      = "ctest --test-dir build -C Release --output-on-failure --label-include parser-import --exclude-regex \"AudioWorkgroup|Toolbar add items\" --label-exclude slow"

[validation.smoke]
# Lighter validation for quick sanity checks. Builds without tests +
# GPU + examples; the smoke pipeline (SDK install + downstream
# scaffold build) is folded into the build stage so it works on
# every backend. When Shipyard supports custom stage names on the
# ssh-windows executor, we will split this back out into named
# stages for clearer per-stage failure messages.
stages = ["setup", "configure", "build"]
setup     = "./setup.sh --ci --deps-only"
configure = "cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DPULP_BUILD_TESTS=OFF -DPULP_BUILD_EXAMPLES=OFF"
build     = "cmake --build build --parallel $(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 8) && cmake --install build --prefix install && cmake -S tools/validation/sdk-smoke -B smoke/build -DCMAKE_PREFIX_PATH=install && cmake --build smoke/build --parallel $(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 8)"

[validation.smoke.overrides.windows]
configure = "cmake -S . -B build -G \"Visual Studio 17 2022\" -A x64 -DPULP_BUILD_TESTS=OFF -DPULP_BUILD_EXAMPLES=OFF"
# PowerShell uses ; as the statement separator, not && — note the
# different chaining. The semantics differ: PowerShell does NOT
# short-circuit on failure, so each step is wrapped in a guard.
build     = "cmake --build build --config Release --parallel 4; if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }; cmake --install build --prefix install --config Release; if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }; cmake -S tools/validation/sdk-smoke -B smoke/build -G \"Visual Studio 17 2022\" -A x64 -DCMAKE_PREFIX_PATH=install; if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }; cmake --build smoke/build --config Release --parallel 4"

# ── Targets ────────────────────────────────────────────────────────────────
# One target is declared here: `mac`, the required gate. Linux and Windows
# validate as advisory GitHub-hosted lanes in .github/workflows/build.yml, so
# Shipyard does not need a target for them.
#
# The SSH `ubuntu` / `windows` targets are OPT-IN, per machine. They used to be
# declared here with `host` deferred to the gitignored .shipyard.local/config.toml
# — which no machine in the fleet actually has. Shipyard preflights every
# *declared* target, so on every box the result was:
#
#     Target 'ubuntu' (ssh) is unreachable.
#       Failure category: configuration
#       Last error: target has no host configured
#
# ...an exit-3 on every `shipyard run` / `shipyard pr`, worked around by passing
# `--skip-target ubuntu --skip-target windows` forever. Declaring a target we
# cannot reach makes the *default* path fail closed for a lane that is advisory
# anyway. So the targets move to where their hosts live.
#
# To re-enable a local SSH lane on one machine, copy the target block from
# .shipyard.local/config.toml.example into .shipyard.local/config.toml and fill
# in `host` + `repo_path`. That overlay can define a target outright, not merely
# supply its host — verified against Shipyard v0.70.0. Nothing else changes: the
# [validation.*.overrides.windows] recipes below stay version-controlled here and
# apply the moment the target exists.
#
# Note for anyone reaching for [profiles.*]: a profile's `targets` list does NOT
# gate preflight in Shipyard v0.70.0. Setting `profile = "local"` still probes
# every declared target. Profiles are the natural home for this and one day may
# be; until then, "declared" is the only thing that matters.

[targets.mac]
# 2026-05-20: Namespace macOS routing is disabled for cost control.
# Shipyard validates the mac target locally again; GitHub Actions routes
# the required macOS check through the self-hosted pulp-build runners.
backend  = "local"
platform = "macos-arm64"
workflow = "build"
# Phase 8 timeout bump (Dawn + Skia + mbedtls + cargo build); see
# git history for context. Kept at 1h because clean local builds still
# run long on cold caches.
timeout_secs = 3600

# ── Cloud dispatch (manual only) ───────────────────────────────────────────
# Namespace remains available only for explicit operator-dispatched cloud
# runs. It is not the default mac target and should not be used as
# automatic PR-validation failover while the repo variables are unset.

[cloud]
provider   = "namespace"
workflow   = "build"
repository = "danielraffel/pulp"

# ── Merge gating ───────────────────────────────────────────────────────────
# Shipyard's can_merge() requires evidence (passing validation) for
# every required platform on the exact merge-candidate SHA before
# `shipyard ship` will merge. This is stricter than local_ci.py's
# job.passed check, which only required the most recent run to pass.

[merge]
require_platforms = ["macos", "linux", "windows"]

# ── Governance (required-check contract) ───────────────────────────────────
# The GitHub checks that must be green before `main` accepts a merge. This
# mirrors the LIVE branch-protection ruleset, NOT the full ship platform set:
# only the macOS build+test leg and the version/skill-sync gate are blocking.
# Linux and Windows validate as advisory GitHub-hosted lanes (see [project]
# platforms) and deliberately do NOT gate merge — making them blocking would
# crater throughput without adding signal. Keep this list aligned with
# .github/rulesets/main-protection.json.
[governance]
required_status_checks = ["macos", "Enforce version & skill sync"]

# Per-branch protection knobs. `require_strict_status = true` means a PR must
# be up to date with `main` (re-validated on the exact merge-candidate SHA)
# before it can merge — matching the ruleset's
# strict_required_status_checks_policy.
[branch_protection."main"]
require_strict_status = true

# ── Ship defaults ──────────────────────────────────────────────────────────

[ship]
base_branch = "main"

# ── Changelog & post-tag sync (issue #53, shipyard v0.9.0) ────────────────
# Shipyard owns CHANGELOG.md regeneration after tag pushes. The GitHub Release
# body is composed separately in release-cli.yml from Pulp highlights plus
# GitHub's generated release notes.

[release.changelog]
enabled    = true
repo_url   = "https://github.com/danielraffel/pulp"
path       = "CHANGELOG.md"
tag_filter = "v*"
product    = "Pulp"
skip_commit_patterns = [
  "^chore: bump .*version",
  "^chore\\(release\\): ",
  "^bump .*to v?\\d+\\.\\d+\\.\\d+$",
]
# Preserve pulp's pre-migration HTML header verbatim so the byte-identity
# validation gate passes. Shipyard v0.11.0+ accepts a full comment block
# here; pre-0.11 hardcoded shipyard's own docs-path reference, which
# would have forced a header-text change during the migration.
header_comment = """<!-- This file is auto-regenerated after every SDK tag by Shipyard's
     `shipyard changelog regenerate` post-tag hook. Edits are picked up on the
     next regen as long as they land in the right release's bullet block. See
     docs/guides/versioning.md § Release pipeline for the full end-to-end flow. -->"""

[release.post_tag_hook]
enabled  = true
command  = "shipyard changelog regenerate"
watch    = ["CHANGELOG.md"]
trailers = [
  'Version-Bump: sdk=skip reason="docs-only automated regeneration"',
  'Skill-Update: skip skill=ci reason="no workflow shape change"',
  'Release: skip reason="bot commit; prevent recursive auto-release"',
]
only_for_tag_pattern = "v*"
max_push_attempts    = 5

[release.post_tag_hook.bot_identity]
name  = "pulp-release-bot"
email = "25807+danielraffel@users.noreply.github.com"
