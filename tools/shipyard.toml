# Pulp's pinned Shipyard release.
#
# Shipyard is the cross-platform CI controller Pulp uses for queue,
# multi-platform validation, and merge gating. Pulp pins a specific
# Shipyard release here so every checkout uses the same version.
#
# To install or upgrade:
#   ./tools/install-shipyard.sh
#
# To check what's installed vs what's pinned:
#   ./tools/install-shipyard.sh --status
#
# To bump the pin (after verifying a new Shipyard release works on
# Pulp's CI matrix):
#   1. Edit `version` below.
#   2. Run `./tools/install-shipyard.sh` to download the new binary.
#   3. Run `shipyard run` on a feature branch to verify.
#   4. Open a PR with this file change and your verification notes.
#
# Lockstep docs:
# When bumping the pin, also re-check that the following docs still
# accurately describe what Shipyard provides at the new version:
#   - README.md (Contributing + Security & CI policy section)
#   - CONTRIBUTING.md (Contributor expectations section)
#   - .agents/skills/ci/SKILL.md (tool-selection logic)
#   - docs/guides/local-ci.md (cross-references between local_ci.py
#     and shipyard, eventual removal once local_ci.py is retired)
# If a Shipyard release introduces a new command, deprecates one, or
# changes governance defaults, update those docs in the same PR that
# bumps this pin.

[shipyard]
# Pinned to the first Shipyard release whose Windows SSH executor
# actually works end-to-end on Pulp's ARM64 Windows target.
# Earlier releases (v0.1.3 through v0.1.12) silently reported
# "pass in 0.9s with empty log" on Windows because multi-line
# PowerShell scripts fed as inline argv were mangled by the
# cmd.exe default shell — each newline split into a separate
# command, so the mutex wrapper ran only its first line and
# exited 0. v0.1.13 switches all SSH→PowerShell transport to
# `-EncodedCommand` (base64 UTF-16LE), which cmd.exe cannot
# split, and fixes a latent `detect_vs_toolchain` bug that was
# silently returning None on every run.
#
# Everything v0.1.3 → v0.1.12 added is still included:
#   - validation contract markers (__PULP_VALIDATION__:smoke|full)
#   - prepared-state reuse keyed by (sha, target, mode)  [local only]
#   - Windows host mutex + Visual Studio auto-detection
#   - SSH→cloud auto-failover via [failover.cloud_auto]
#   - governance profiles (solo/multi/custom) + status/apply
#   - governance use / export / apply --from (disaster recovery)
#   - branch apply --create and ship --base develop/* auto-create
#   - doctor drift integration with honest immutable-releases row
#   - bundle upload 30min timeout + per-target override
#   - Codex P1 batch: apply timeout, fallback kwargs, streaming cap
#
# v0.1.1 was a no-op stub on macOS — do not pin to anything older
# than v0.1.2.
version = "v0.1.16"

# Public release source. The bootstrap script downloads from
# https://github.com/{repo}/releases/download/{version}/{asset}
repo = "danielraffel/Shipyard"

# SHA-256 verification asset name (downloaded alongside the binary).
checksums_asset = "checksums.sha256"

# Per-platform binary asset names. The bootstrap script picks the
# right one for the current host.
[shipyard.assets]
darwin-arm64  = "shipyard-macos-arm64"
darwin-x64    = "shipyard-macos-x64"
linux-arm64   = "shipyard-linux-arm64"
linux-x64     = "shipyard-linux-x64"
windows-x64   = "shipyard-windows-x64.exe"
