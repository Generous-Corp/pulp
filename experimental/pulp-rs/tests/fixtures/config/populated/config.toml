# Pulp config — fully populated fixture.
# Exercises every known key so the writer round-trip preserves comments.
[pr]
workflow = "github"

[update]
mode = "auto"
check_interval_hours = "48"
channel = "beta"
bump_projects = "off"

[import_design]
default_mode = "baked"
default_emit = "cpp"

[claude]
send_user_file = "off"
